<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PeakTrack – Training & Bouldern</title>
<style>
:root{
  --bg:#0b1220;--bg-2:#111a2e;--bg-3:#1a2540;--card:#152033;--card-2:#1c2942;
  --text:#e8edf7;--text-muted:#8a98b3;--text-dim:#5b6a86;
  --border:#243352;--border-2:#2e405f;
  --accent:#3da5ff;--accent-2:#1f7fd6;--accent-soft:#1b3a5c;
  --success:#34d399;--warning:#fbbf24;--orange:#fb923c;--danger:#f87171;
  --purple:#a78bfa;--pink:#f472b6;
  --shadow:0 6px 24px rgba(0,0,0,.35);
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --tap:44px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
[data-theme="light"]{
  --bg:#f5f7fb;--bg-2:#eef2f8;--bg-3:#e3e9f3;--card:#ffffff;--card-2:#f7f9fc;
  --text:#0f172a;--text-muted:#475569;--text-dim:#94a3b8;
  --border:#dbe2ee;--border-2:#c8d2e2;
  --accent:#1f7fd6;--accent-2:#155da0;--accent-soft:#dbeafe;
  --shadow:0 4px 18px rgba(15,23,42,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,sans-serif;
  font-size:15px;line-height:1.45;overscroll-behavior-y:none}
body{min-height:100vh;min-height:100dvh}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{
  background:var(--bg-2);border:1px solid var(--border);color:var(--text);
  padding:10px 12px;border-radius:var(--radius-sm);outline:none;width:100%;
  transition:border-color .15s,background .15s
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
h1,h2,h3,h4{margin:0 0 8px;font-weight:700;letter-spacing:-.01em}
h1{font-size:1.4rem}h2{font-size:1.15rem}h3{font-size:1rem}h4{font-size:.9rem}
a{color:var(--accent);text-decoration:none}

/* Layout */
#app{display:flex;min-height:100vh;min-height:100dvh}
.sidebar{display:none;flex-direction:column;width:240px;background:var(--bg-2);
  border-right:1px solid var(--border);padding:24px 14px;position:sticky;top:0;height:100dvh}
.sidebar .logo{display:flex;align-items:center;gap:10px;font-weight:800;
  font-size:1.1rem;padding:0 8px 16px;color:var(--text)}
.sidebar .logo .dot{width:14px;height:14px;border-radius:4px;background:var(--accent)}
.sidebar nav{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.sidebar nav button{display:flex;align-items:center;gap:12px;padding:11px 12px;
  border-radius:var(--radius-sm);color:var(--text-muted);font-weight:500;text-align:left}
.sidebar nav button.active{background:var(--accent-soft);color:var(--accent)}
.sidebar nav button:hover{background:var(--bg-3);color:var(--text)}
.sidebar nav button .ico{width:22px;text-align:center}

main{flex:1;display:flex;flex-direction:column;min-width:0;
  padding-bottom:calc(72px + var(--safe-bottom))}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px calc(14px + var(--safe-top));position:sticky;top:0;background:var(--bg);
  z-index:10;border-bottom:1px solid var(--border)}
.topbar h1{margin:0;font-size:1.1rem}
.topbar .tools{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:10px;display:inline-flex;
  align-items:center;justify-content:center;background:var(--bg-2);border:1px solid var(--border)}
.icon-btn:hover{background:var(--bg-3)}
.view{padding:14px 16px 30px;max-width:1100px;width:100%;margin:0 auto}

/* Bottom nav (mobile) */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:flex;
  background:var(--bg-2);border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);z-index:50}
.bottom-nav button{flex:1;min-height:60px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;color:var(--text-muted);
  font-size:.7rem;font-weight:500}
.bottom-nav button.active{color:var(--accent)}
.bottom-nav button .ico{font-size:1.2rem;line-height:1}

@media(min-width:900px){
  .sidebar{display:flex}
  .bottom-nav{display:none}
  main{padding-bottom:30px}
  .view{padding:24px 28px 40px}
  .topbar{padding-left:28px;padding-right:28px}
}

/* Cards & components */
.card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card.elev{box-shadow:var(--shadow)}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--text-muted)}.dim{color:var(--text-dim)}.small{font-size:.85rem}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1;min-width:0}
.row.tight{gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.grid-4{grid-template-columns:repeat(2,1fr)}}
.label{display:block;font-size:.78rem;color:var(--text-muted);margin:0 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 16px;background:var(--bg-3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-weight:600;
  min-height:var(--tap);transition:transform .1s,background .15s}
.btn:hover{background:var(--card-2)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-2)}
.btn.ghost{background:transparent}
.btn.danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn.success{background:var(--success);color:#04211a;border-color:var(--success)}
.btn.block{width:100%}
.btn.sm{padding:7px 11px;font-size:.85rem;min-height:36px}
.btn.icon{padding:9px;min-width:38px;min-height:38px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;
  background:var(--bg-3);border:1px solid var(--border);border-radius:999px;
  font-size:.78rem;color:var(--text-muted);font-weight:600}
.chip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.chip-btn{cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.7rem;font-weight:700;
  background:var(--accent-soft);color:var(--accent)}
.badge.warn{background:rgba(251,191,36,.15);color:var(--warning)}
.badge.danger{background:rgba(248,113,113,.15);color:var(--danger)}
.badge.success{background:rgba(52,211,153,.15);color:var(--success)}

/* Stars rating */
.stars{display:inline-flex;gap:4px}
.stars button{font-size:1.3rem;color:var(--text-dim);padding:2px}
.stars button.on{color:var(--warning)}

/* Slider */
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-val{min-width:36px;text-align:center;font-weight:700;color:var(--accent)}

/* Modal/Sheet */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;animation:fade .15s}
@keyframes fade{from{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}}
.sheet{background:var(--card);width:100%;max-width:560px;
  max-height:92dvh;overflow-y:auto;border-radius:20px 20px 0 0;
  padding:18px 16px calc(20px + var(--safe-bottom));animation:slideUp .25s}
@media(min-width:900px){
  .modal-bg{align-items:center}
  .sheet{border-radius:20px;max-height:85vh}
}
.sheet h2{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sheet h2 .close{font-size:1.6rem;color:var(--text-muted);padding:4px 10px}

/* Toast */
.toast{position:fixed;left:50%;bottom:calc(80px + var(--safe-bottom));transform:translateX(-50%);
  background:var(--card-2);color:var(--text);padding:10px 16px;border-radius:999px;
  border:1px solid var(--border);box-shadow:var(--shadow);z-index:200;
  display:flex;align-items:center;gap:10px;animation:slideUp .2s}
.toast button{color:var(--accent);font-weight:700}

/* Calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-grid .dow{font-size:.7rem;color:var(--text-muted);text-align:center;font-weight:700;padding:4px 0}
.cal-day{aspect-ratio:1;background:var(--bg-2);border:1px solid var(--border);
  border-radius:8px;padding:4px;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;font-size:.8rem;cursor:pointer;position:relative}
.cal-day.other{opacity:.35}
.cal-day.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.cal-day.deload{background:rgba(61,165,255,.12)}
.cal-day .num{font-weight:700;font-size:.85rem}
.cal-day .icons{display:flex;gap:1px;font-size:.65rem;flex-wrap:wrap;justify-content:center;line-height:1}
.cal-day .dot{width:6px;height:6px;border-radius:50%;margin-top:auto}

/* Boulder pyramid */
.pyramid-row{display:flex;align-items:center;gap:8px;margin:3px 0}
.pyramid-row .grade{width:42px;font-weight:700;font-size:.85rem}
.pyramid-row .bar{flex:1;height:24px;background:var(--bg-2);border-radius:6px;display:flex;overflow:hidden}
.pyramid-row .seg{height:100%;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:#000}
.seg.flash{background:var(--warning)}
.seg.send{background:var(--success);color:#04211a}
.seg.top{background:var(--accent)}
.seg.attempt{background:var(--text-dim)}

/* Body diagram */
.body-svg{width:100%;max-width:280px;display:block;margin:0 auto}
.body-svg path,.body-svg circle{fill:var(--bg-3);stroke:var(--border-2);
  stroke-width:1.5;cursor:pointer;transition:fill .15s}
.body-svg path:hover,.body-svg circle:hover{fill:var(--accent-soft)}
.body-svg .selected{fill:var(--danger)!important}
.body-tabs{display:flex;justify-content:center;gap:6px;margin:8px 0}

/* Rest timer */
.timer-circle{position:relative;width:160px;height:160px;margin:0 auto}
.timer-circle svg{transform:rotate(-90deg)}
.timer-circle .timer-text{position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;font-size:2rem;font-weight:800}

/* PR Celebration */
@keyframes pop{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.pr-celebrate{animation:pop .5s ease}

/* Drag handle */
.drag-handle{cursor:grab;color:var(--text-dim);padding:4px 8px;user-select:none}
.dragging{opacity:.4}
.drag-over{border-top:2px solid var(--accent)!important}

/* Utility */
.center{text-align:center}.mt{margin-top:14px}.mb{margin-bottom:14px}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px}
.gap{gap:10px}
.empty-state{text-align:center;padding:36px 20px;color:var(--text-muted)}
.empty-state .em{font-size:2.4rem;margin-bottom:6px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.list-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-2);
  border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.list-item:last-child{margin-bottom:0}
.x-btn{padding:4px 10px;color:var(--danger);font-weight:700}

/* Set row in active session */
.set-row{display:grid;grid-template-columns:30px 1fr 1fr auto;gap:6px;align-items:center;padding:6px 0}
.set-row.boulder{grid-template-columns:30px 1fr 1fr auto}
.set-row.hangboard{grid-template-columns:30px 1fr 1fr auto}

/* Responsive tabs */
.tabs{display:flex;gap:4px;background:var(--bg-2);padding:4px;border-radius:10px;margin-bottom:14px;overflow-x:auto}
.tabs button{flex:1;min-width:max-content;padding:8px 12px;border-radius:7px;color:var(--text-muted);font-weight:600;font-size:.85rem;white-space:nowrap}
.tabs button.active{background:var(--card);color:var(--text)}

/* Stat tile */
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;display:flex;flex-direction:column;gap:2px}
.stat-tile .v{font-size:1.4rem;font-weight:800;color:var(--accent)}
.stat-tile .l{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}

/* Switch */
.switch{position:relative;display:inline-block;width:46px;height:26px}
.switch input{opacity:0;width:0;height:0}
.switch span{position:absolute;inset:0;background:var(--bg-3);border-radius:999px;
  border:1px solid var(--border);transition:.2s}
.switch span:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:2px;
  background:var(--text);border-radius:50%;transition:.2s}
.switch input:checked + span{background:var(--accent);border-color:var(--accent)}
.switch input:checked + span:before{transform:translateX(20px);background:#fff}

/* Banner */
.banner{padding:12px 14px;border-radius:var(--radius-sm);
  background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.4);
  color:var(--warning);margin-bottom:12px;font-size:.9rem}
.banner.info{background:rgba(61,165,255,.12);border-color:rgba(61,165,255,.4);color:var(--accent)}

/* Confirm */
.confirm-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

/* Hidden */
.hidden{display:none!important}

/* Scroll touch fix */
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* Chart container */
.chart-box{background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:12px}
.chart-box h3{margin-bottom:8px}
.chart-canvas-wrap{position:relative;height:240px}

/* Quick exercise tile */
.qx{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px;text-align:left;display:flex;flex-direction:column;gap:2px}
.qx:hover{background:var(--bg-3)}
.qx .name{font-weight:700;font-size:.9rem}
.qx .meta{font-size:.7rem;color:var(--text-muted)}

/* Plan day */
.plan-day{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.plan-day h3{display:flex;justify-content:space-between;align-items:center;font-size:1rem;margin-bottom:8px}
.plan-day .item{display:flex;align-items:center;gap:8px;background:var(--bg-2);
  border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px}
.plan-day .item:last-child{margin-bottom:0}
.plan-day .item .name{flex:1}

/* Active session sticky bar */
.session-bar{position:sticky;top:0;z-index:5;background:var(--card);
  border-bottom:1px solid var(--border);padding:10px 14px;display:flex;
  justify-content:space-between;align-items:center;margin:-14px -16px 14px}
@media(min-width:900px){.session-bar{margin:-24px -28px 18px}}

</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="logo"><span class="dot"></span> PeakTrack</div>
    <nav id="sidebar-nav"></nav>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="topbar-title">Dashboard</h1>
      <div class="tools">
        <span id="sync-indicator" style="font-size:.75rem;font-weight:600;padding:0 6px;color:var(--text-muted)"></span>
        <button class="icon-btn" id="theme-toggle" title="Theme wechseln">🌓</button>
      </div>
    </div>
    <div class="view" id="view"></div>
  </main>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>window._chartReady=false;</script>
<script>
/* ============================================================
   PeakTrack — Bouldering & Training Tracker
   Single-file vanilla JS app. All UI strings: German.
   Code comments: English.
============================================================ */

/* -------- 1. Storage layer ---------- */

// ↓ Deine Apps Script Web-App URL hier eintragen (nach dem Deployen):
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwo9faNQEjUVmvHxRO_931yZnkHc0uFLWII-fp_it8X-wkYeCylgIU4ChteOldzGSER9Q/exec';

const KEYS = ['sessions','weekPlan','blocks','exercises','bodyweight',
              'injuries','settings','sleep','nutrition','halls','recentExercises'];

let _syncTimer = null;
let _syncStatus = 'idle'; // 'idle' | 'syncing' | 'ok' | 'error'

const Store = {
  get(k, d){ try{ const v = localStorage.getItem('pt_'+k);
    return v===null ? d : JSON.parse(v); } catch(e){ return d; } },
  set(k,v){
    localStorage.setItem('pt_'+k, JSON.stringify(v));
    Store._scheduleSync();
  },
  _scheduleSync(){
    if(!SCRIPT_URL) return;
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(Store._doSync, 1500);
  },
  async _doSync(){
    if(!SCRIPT_URL) return;
    _syncStatus = 'syncing';
    Store._updateSyncUI();
    try {
      const payload = JSON.stringify(Store.exportAll());
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: payload,
        headers: { 'Content-Type': 'text/plain' }
      });
      _syncStatus = 'ok';
    } catch(e) {
      _syncStatus = 'error';
      console.warn('Cloud-Sync fehlgeschlagen:', e);
    }
    Store._updateSyncUI();
    setTimeout(()=>{ _syncStatus = 'idle'; Store._updateSyncUI(); }, 3000);
  },
  async loadFromCloud(){
    if(!SCRIPT_URL) return false;
    try {
      const r = await fetch(SCRIPT_URL + '?t=' + Date.now());
      if(!r.ok) return false;
      const data = await r.json();
      if(data && typeof data === 'object' && data.__meta){
        // Import without triggering sync (avoids echo loop)
        KEYS.forEach(k=>{ if(k in data && data[k]!==null)
          localStorage.setItem('pt_'+k, JSON.stringify(data[k])); });
        return true;
      }
    } catch(e) {
      console.warn('Cloud-Laden fehlgeschlagen:', e);
    }
    return false;
  },
  _updateSyncUI(){
    const el = document.getElementById('sync-indicator');
    if(!el) return;
    if(_syncStatus==='syncing'){ el.textContent='☁ Sync…'; el.style.color='var(--text-muted)'; }
    else if(_syncStatus==='ok'){  el.textContent='☁ ✓';    el.style.color='var(--success)'; }
    else if(_syncStatus==='error'){el.textContent='☁ ✗';   el.style.color='var(--danger)'; }
    else { el.textContent=''; }
  },
  exportAll(){
    const out = {};
    KEYS.forEach(k=> out[k] = Store.get(k, null));
    out.__meta = { app:'PeakTrack', exported: new Date().toISOString(), version:1 };
    return out;
  },
  importAll(obj){
    if(!obj || typeof obj !== 'object') throw new Error('Ungültiges Format');
    KEYS.forEach(k=>{ if(k in obj && obj[k]!==null) Store.set(k, obj[k]); });
  },
  clearAll(){ KEYS.forEach(k=> localStorage.removeItem('pt_'+k)); }
};

/* -------- 2. Default seed data ------- */
const SEED_EXERCISES = [
  {id:'ex_pullup', name:'Klimmzüge', type:'strength', muscles:['Rücken','Bizeps'], note:'Voller Hang, breiter Griff'},
  {id:'ex_wpullup', name:'Klimmzüge gewichtet', type:'strength', muscles:['Rücken','Bizeps']},
  {id:'ex_muscleup', name:'Muscle-up', type:'strength', muscles:['Rücken','Brust','Trizeps']},
  {id:'ex_dip', name:'Dips', type:'strength', muscles:['Brust','Trizeps','Schulter']},
  {id:'ex_pushup', name:'Liegestütze', type:'strength', muscles:['Brust','Trizeps','Schulter']},
  {id:'ex_press', name:'Schulterdrücken', type:'strength', muscles:['Schulter','Trizeps']},
  {id:'ex_row', name:'Rudern', type:'strength', muscles:['Rücken']},
  {id:'ex_facepull', name:'Face Pulls', type:'strength', muscles:['Schulter hinten','Trapez']},
  {id:'ex_hb_max', name:'Fingerboard Max Hang', type:'hangboard', muscles:['Finger','Unterarm']},
  {id:'ex_hb_rep', name:'Fingerboard Repeaters', type:'hangboard', muscles:['Finger','Unterarm']},
  {id:'ex_campus', name:'Campus Board', type:'strength', muscles:['Finger','Rücken','Bizeps']},
  {id:'ex_plank', name:'Plank', type:'strength', muscles:['Core']},
  {id:'ex_lsit', name:'L-Sit', type:'strength', muscles:['Core','Hüftbeuger']},
  {id:'ex_hollow', name:'Hollow Body', type:'strength', muscles:['Core']},
  {id:'ex_dragon', name:'Dragon Flag', type:'strength', muscles:['Core']},
  {id:'ex_abwheel', name:'Ab Wheel', type:'strength', muscles:['Core']},
  {id:'ex_squat', name:'Kniebeugen', type:'strength', muscles:['Beine','Po']},
  {id:'ex_lunge', name:'Ausfallschritte', type:'strength', muscles:['Beine','Po']},
  {id:'ex_box', name:'Box Jumps', type:'strength', muscles:['Beine','Plyo']},
  {id:'ex_climb', name:'Bouldern', type:'climb', muscles:['Ganzkörper']},

function afterDashboard(){

function rateNutr(n){
  const list = Store.get('nutrition',[]).filter(x=>x.date!==todayISO());
  list.push({date:todayISO(), quality:n}); Store.set('nutrition',list); render();
}

function computeStreak(sessions){
  if(!sessions.length) return 0;
  const dates = new Set(sessions.map(s=>s.date));
  let streak = 0; const d = new Date();
  // count back day-by-day; allow today not yet trained but yesterday counts
  let i = 0;
  while(true){
    const dd = new Date(); dd.setDate(d.getDate()-i);
    const iso = dd.toISOString().slice(0,10);
    if(dates.has(iso)){ streak++; i++; continue; }
    if(i===0){ i++; continue; } // skip today if not yet trained
    break;
  }
  return streak;
}
function computeWeeklyGoals(sessions, settings){
  const now = new Date();
  const day = (now.getDay()+6)%7; // 0 = Mon
  const monday = new Date(now); monday.setDate(now.getDate()-day);
  const mIso = monday.toISOString().slice(0,10);
  const inWeek = sessions.filter(s=> s.date >= mIso);
  let gradeSends = 0;
  inWeek.forEach(s=>{
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      ex.problems?.forEach(p=>{
        if((p.result==='Send'||p.result==='Flash') && p.grade===settings.goals.targetGrade) gradeSends++;
      });
    }));
  });
  return { done: inWeek.length, target: settings.goals.sessionsPerWeek, gradeSends };
}
function needsDeload(sessions){
  // 3+ consecutive weeks with avg post-RPE >=7 OR high volume
  if(sessions.length<6) return false;
  const byWeek = {};
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00');
    const day = (d.getDay()+6)%7; const m = new Date(d); m.setDate(d.getDate()-day);
    const k = m.toISOString().slice(0,10);
    byWeek[k] = byWeek[k] || {rpes:[], count:0};
    if(typeof s.rpePostPhys === 'number') byWeek[k].rpes.push(s.rpePostPhys);
    byWeek[k].count++;
  });
  const weeks = Object.keys(byWeek).sort().slice(-3);
  if(weeks.length<3) return false;
  return weeks.every(k=>{
    const w = byWeek[k];
    const avg = w.rpes.length ? w.rpes.reduce((a,b)=>a+b,0)/w.rpes.length : 0;
    return avg >= 7 || w.count >= 4;
  });
}

function startSession(preset){
  // preset: { blocks: [...] } optional
  if(State.currentSession){ go('session'); return; }

    id: uid('s'),
    date: todayISO(),
    startedAt: Date.now(),
    rpePrePhys:null, rpePreMental:null, preNote:'',
    rpePostPhys:null, rpePostMental:null, note:'',
    blocks: preset?.blocks || [
      {key:'warmup', name:'Warm-up', exercises:[]},
      {key:'climb', name:'Klettern / Bouldern', exercises:[]},
      {key:'weights', name:'Krafttraining', exercises:[]},
      {key:'cooldown', name:'Cool-down', exercises:[]}
    ],
    durationSec: 0
  };
  go('session');
}
function quickStart(kind, id){
  const blocks = [{key:'warmup', name:'Warm-up', exercises:[]},
    {key:'main', name:'Hauptteil', exercises:[]},
    {key:'cooldown', name:'Cool-down', exercises:[]}];
  if(kind==='exercise'){
    const ex = Store.get('exercises',[]).find(e=>e.id===id);
    if(ex) blocks[1].exercises.push(buildExerciseInstance(ex));
  } else if(kind==='block'){
    const blk = Store.get('blocks',[]).find(b=>b.id===id);
    const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
    if(blk) blk.exerciseIds.forEach(eid=>{
      const ex = exMap[eid]; if(ex) blocks[1].exercises.push(buildExerciseInstance(ex));
    });
  }
  startSession({blocks});
}
function buildExerciseInstance(ex){
  return {
    id: uid('e'), refId: ex.id, name: ex.name, type: ex.type, muscles: ex.muscles||[],
    sets: [], problems: [], protocols: [], cardio: null, supersetWith: null
  };
}

function cardioDeriv(c, isBike){
  if(!c.distance || !c.time) return '';
  const parts = c.time.split(':').map(Number);
  if(parts.some(isNaN)) return '';
  let secs = 0;
  if(parts.length===3) secs = parts[0]*3600+parts[1]*60+parts[2];
  else if(parts.length===2) secs = parts[0]*60+parts[1];
  else return '';
  if(secs===0||c.distance===0) return '';
  if(isBike){
    const kmh = c.distance / (secs/3600); return kmh.toFixed(1)+' km/h';
  } else {
    const sPerKm = secs / c.distance;
    const m = Math.floor(sPerKm/60), s = Math.round(sPerKm%60);
    return `${m}:${String(s).padStart(2,'0')} /km`;
  }
}
function lastSessionPerformance(refId){
  const sessions = Store.get('sessions',[]);
  for(let i=sessions.length-1;i>=0;i--){
    const s = sessions[i];
    for(const b of s.blocks||[]) for(const ex of b.exercises||[]){
      if(ex.refId===refId && ex.sets && ex.sets.length){
        const last = ex.sets[ex.sets.length-1];
        return `${ex.sets.length}× zuletzt am ${fmtDateShort(s.date)}: ${last.wReps||0}×${last.weight||0}kg`;
      }
    }
  }
  return null;
}

/* Mutation functions for active session */
function withSes(fn){ if(State.currentSession){ fn(State.currentSession); render(); } }
function updateBlockName(i,name){ withSes(s=> s.blocks[i].name = name); }
function moveBlock(i, dir){
  withSes(s=>{
    const j = i+dir; if(j<0||j>=s.blocks.length) return;
    [s.blocks[i],s.blocks[j]] = [s.blocks[j],s.blocks[i]];
  });
}
function removeBlock(i){
  confirmDialog('Block entfernen?','Alle Übungen darin gehen verloren.', ()=>{
    withSes(s=> s.blocks.splice(i,1));

}

}
function rmExercise(b,e){ withSes(s=> s.blocks[b].exercises.splice(e,1)); }
function addSet(b,e){
  withSes(s=>{
    const ex = s.blocks[b].exercises[e];
    const last = ex.sets[ex.sets.length-1];
    ex.sets.push({wReps: last?.wReps||null, weight: last?.weight||null,
      bReps: last?.bReps||null, superset:false, doneAt:null});

  State.currentSession.blocks[b].exercises[e].sets[k][field] = val;

  withSes(s=> s.blocks[b].exercises[e].sets.splice(k,1));
}

  State.currentSession.blocks[b].exercises[e].sets[k].doneAt = Date.now();
  startRestTimer();
}
function addProto(b,e){

function rmProto(b,e,k){ withSes(s=> s.blocks[b].exercises[e].protocols.splice(k,1)); }
function finishProto(b,e,k){ startRestTimer(); }
function runRepeaterTimer(b,e,k){
  const p = State.currentSession.blocks[b].exercises[e].protocols[k];

function updProb(b,e,k,f,v){

function rmProb(b,e,k){ withSes(s=> s.blocks[b].exercises[e].problems.splice(k,1)); }
function toggleHold(b,e,k,h){

function pushRecent(item){

  list.unshift(item); Store.set('recentExercises', list.slice(0,8));
}

/* Finish session */
function finishSession(){
  const ses = State.currentSession; if(!ses) return;
  // basic validity: at least one exercise/block has content
  const has = ses.blocks.some(b=> b.exercises.length>0);
  if(!has){
    confirmDialog('Leere Session speichern?','Du hast noch keine Übungen geloggt.',()=> reallyFinish(), {});
    return;
  }
  reallyFinish();
}
function reallyFinish(){
  const ses = State.currentSession;
  ses.durationSec = Math.round((Date.now() - ses.startedAt)/1000);
  // Detect PRs
  const prs = detectPRs(ses);
  // Save
  const list = Store.get('sessions', []); list.push(ses); Store.set('sessions', list);
  State.currentSession = null;
  if(State._sessTimer) clearInterval(State._sessTimer);
  if(prs.length){
    openModal(`<div class="sheet center">
      <div style="font-size:3rem" class="pr-celebrate">🏆</div>
      <h2 style="justify-content:center">Neue PRs!</h2>
      ${prs.map(p=>`<div class="badge success" style="margin:4px">${escHtml(p)}</div>`).join('')}
      <div class="mt"><button class="btn primary" onclick="closeModal();go('dashboard')">Super!</button></div>
    </div>`);
  } else {
    toast('Session gespeichert ✓');
    go('dashboard');
  }
}
function cancelSession(){
  confirmDialog('Session verwerfen?','Alle Eingaben gehen verloren.', ()=>{
    State.currentSession = null;
    if(State._sessTimer) clearInterval(State._sessTimer);
    go('dashboard');
  }, {danger:true, yesLabel:'Verwerfen'});
}
function detectPRs(ses){
  const prs = [];
  const past = Store.get('sessions',[]);
  ses.blocks.forEach(b=> b.exercises.forEach(ex=>{
    if(ex.type==='strength' && ex.sets.length){
      let bestW = 0, bestVol = 0, bestReps = 0;
      ex.sets.forEach(s=>{
        if((s.weight||0)>bestW) bestW = s.weight||0;
        const v = (s.weight||0) * ((s.wReps||0)+(s.bReps||0));
        if(v>bestVol) bestVol = v;
        if((s.wReps||0)+(s.bReps||0)>bestReps) bestReps = (s.wReps||0)+(s.bReps||0);
      });
      let prevW=0, prevVol=0, prevReps=0;
      past.forEach(ps=> ps.blocks?.forEach(pb=> pb.exercises?.forEach(pex=>{
        if(pex.refId===ex.refId) pex.sets?.forEach(s=>{
          if((s.weight||0)>prevW) prevW = s.weight||0;
          const v = (s.weight||0)*((s.wReps||0)+(s.bReps||0));
          if(v>prevVol) prevVol = v;
          if((s.wReps||0)+(s.bReps||0)>prevReps) prevReps=(s.wReps||0)+(s.bReps||0);
        });
      })));
      if(bestW>prevW && bestW>0) prs.push(`${ex.name}: ${bestW} kg`);
      else if(bestReps>prevReps && bestReps>0) prs.push(`${ex.name}: ${bestReps} Wdh.`);
      else if(bestVol>prevVol && bestVol>0) prs.push(`${ex.name}: ${Math.round(bestVol)} kg·Wdh.`);
    }
  }));
  return prs;
}

/* Rest timer */
function startRestTimer(){
  const s = Store.get('settings', DEFAULT_SETTINGS);
  showRestTimer(s.restTimerSeconds, s.beepEnabled);
}
function showRestTimer(seconds, beep){
  const total = seconds;
  let endsAt = Date.now() + seconds*1000;
  openModal(`<div class="sheet center">
    <h2 style="justify-content:center">Pause</h2>
    <div class="timer-circle">
      <svg viewBox="0 0 120 120" width="160" height="160">
        <circle cx="60" cy="60" r="54" stroke="var(--bg-3)" stroke-width="10" fill="none"/>
        <circle id="rt-arc" cx="60" cy="60" r="54" stroke="var(--accent)" stroke-width="10" fill="none"
          stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="rt-text">${seconds}</div>
    </div>
    <div class="row mt">
      <button class="btn sm" onclick="adjustRest(-15)">−15s</button>
      <button class="btn sm" onclick="adjustRest(15)">+15s</button>
    </div>
    <div class="mt">
      <button class="btn block" onclick="closeRest()">Pause beenden</button>
    </div>
  </div>`);
  State._restEnd = endsAt; State._restTotal = total; State._restBeep = beep;
  tickRest();
}
function adjustRest(delta){
  State._restEnd += delta*1000;
  State._restTotal = Math.max(State._restTotal, State._restTotal + (delta>0?delta:0));
  tickRest();
}
function tickRest(){
  if(State._restTimer) clearTimeout(State._restTimer);
  const remain = (State._restEnd - Date.now())/1000;
  const txt = document.getElementById('rt-text');
  const arc = document.getElementById('rt-arc');
  if(!txt || !arc) return;
  if(remain<=0){
    txt.textContent = 'Fertig!';
    arc.style.strokeDashoffset = 339.292;
    if(State._restBeep) playBeep();
    setTimeout(()=>{ closeModal(); }, 800);
    return;
  }
  txt.textContent = Math.ceil(remain);
  const frac = remain / State._restTotal;
  arc.style.strokeDashoffset = 339.292 * (1-frac);
  State._restTimer = setTimeout(tickRest, 200);
}
function closeRest(){ if(State._restTimer) clearTimeout(State._restTimer); closeModal(); }
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = 880; o.type='sine';
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.3, ctx.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.4);
    o.start(); o.stop(ctx.currentTime+.45);
  }catch(e){}
}

/* Repeater sequence: hang -> rest -> repeat for reps -> set rest */
function startRepeaterSequence(p){
  let phase = 'hang';
  let rep = 1, set = 1;
  let secs = p.hangSec;
  openModal(`<div class="sheet center">
    <h2 style="justify-content:center" id="rep-h">Hängen</h2>
    <div class="muted" id="rep-info">Satz 1/${p.sets} · Wdh 1/${p.reps}</div>
    <div class="timer-circle">
      <svg viewBox="0 0 120 120" width="160" height="160">
        <circle cx="60" cy="60" r="54" stroke="var(--bg-3)" stroke-width="10" fill="none"/>
        <circle id="rep-arc" cx="60" cy="60" r="54" stroke="var(--accent)" stroke-width="10" fill="none"
          stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="rep-text">${secs}</div>
    </div>
    <div class="mt"><button class="btn block" onclick="stopRepSeq()">Stop</button></div>
  </div>`);
  let endsAt = Date.now() + secs*1000;
  let total = secs;
  function loop(){
    const remain = (endsAt - Date.now())/1000;
    document.getElementById('rep-text').textContent = Math.max(0,Math.ceil(remain));
    const frac = Math.max(0,remain)/total;
    const arc = document.getElementById('rep-arc');
    if(arc) arc.style.strokeDashoffset = 339.292*(1-frac);
    if(remain<=0){
      if(Store.get('settings',DEFAULT_SETTINGS).beepEnabled) playBeep();
      // advance phase
      if(phase==='hang'){
        if(rep < p.reps){ phase='rest'; total = p.repRest; endsAt = Date.now()+total*1000;
          document.getElementById('rep-h').textContent='Pause Wdh';
          document.getElementById('rep-info').textContent=`Satz ${set}/${p.sets} · nächste Wdh ${rep+1}/${p.reps}`;
        } else if(set < p.sets){ phase='setrest'; total = p.setRest; endsAt = Date.now()+total*1000;
          document.getElementById('rep-h').textContent='Satzpause';
          document.getElementById('rep-info').textContent=`Nach Satz ${set}/${p.sets}`;
        } else { closeModal(); return; }
      } else if(phase==='rest'){
        rep++; phase='hang'; total = p.hangSec; endsAt = Date.now()+total*1000;
        document.getElementById('rep-h').textContent='Hängen';
        document.getElementById('rep-info').textContent=`Satz ${set}/${p.sets} · Wdh ${rep}/${p.reps}`;
      } else if(phase==='setrest'){
        set++; rep=1; phase='hang'; total = p.hangSec; endsAt = Date.now()+total*1000;
        document.getElementById('rep-h').textContent='Hängen';
        document.getElementById('rep-info').textContent=`Satz ${set}/${p.sets} · Wdh 1/${p.reps}`;
      }
    }
    State._repSeq = setTimeout(loop, 150);
  }
  loop();
}
function stopRepSeq(){ if(State._repSeq) clearTimeout(State._repSeq); closeModal(); }
</script>

function afterPlan(){}

function toggleRest(k, field){

  wp[k] = wp[k]||{name:'',items:[],rest:false,activeRest:false};
  wp[k][field] = !wp[k][field];

  if(field==='activeRest' && wp[k].activeRest) wp[k].rest = false;
  Store.set('weekPlan', wp); render();
}
function rmPlanItem(k,i){

  wp[k].items.splice(i,1); Store.set('weekPlan', wp); render();
}
function openAddPlanItem(day, kind){

    openModal(`<div class="sheet">
      <h2>Übung hinzufügen<button class="close" onclick="closeModal()">×</button></h2>

/* drag & drop reorder within a day */
let _drag = null;
function dragStart(e){
  const el = e.currentTarget;
  _drag = { day: el.dataset.day, i: +el.dataset.i };
  el.classList.add('dragging');
}
function dropOnItem(e){
  e.preventDefault();
  const el = e.currentTarget; el.classList.remove('drag-over');
  const day = el.dataset.day, j = +el.dataset.i;
  if(!_drag || _drag.day!==day) return;
  const wp = Store.get('weekPlan',{});
  const arr = wp[day].items;
  const [it] = arr.splice(_drag.i, 1);
  arr.splice(j,0,it);
  Store.set('weekPlan', wp); _drag = null; render();
}

/* ============================================================
   Section: CALENDAR
============================================================ */
function renderCalendar(){
  const {y,m} = State.cal;
  const first = new Date(y,m,1);
  const startDay = (first.getDay()+6)%7; // Mon=0
  const daysInMonth = new Date(y,m+1,0).getDate();
  const sessions = Store.get('sessions',[]);
  const injuries = Store.get('injuries',[]);
  const sByDate = {};
  sessions.forEach(s=>{ (sByDate[s.date]=sByDate[s.date]||[]).push(s); });
  const monName = first.toLocaleDateString('de-DE',{month:'long',year:'numeric'});

  const cells = [];
  // prev month padding
  const prevMonthDays = new Date(y,m,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    cells.push({n: prevMonthDays-i, other:true, iso:null});
  }
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({n:d, other:false, iso});
  }
  while(cells.length%7!==0) cells.push({n:cells.length-startDay-daysInMonth+1, other:true, iso:null});

  return `
  <div class="cal-head">
    <button class="icon-btn" onclick="changeMonth(-1)">‹</button>
    <h2>${monName}</h2>
    <button class="icon-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid">
    ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="dow">${d}</div>`).join('')}
    ${cells.map(c=>{
      if(!c.iso) return `<div class="cal-day other"><div class="num">${c.n}</div></div>`;
      const dayS = sByDate[c.iso]||[];
      const isToday = c.iso===todayISO();
      const types = new Set();
      dayS.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=> types.add(ex.type))));
      const icons = []; if(types.has('climb')) icons.push('🧗');
      if(types.has('strength')||types.has('hangboard')) icons.push('💪');
      if(types.has('run')) icons.push('🏃'); if(types.has('bike')) icons.push('🚴');
      if(icons.length>=3) icons.length=2, icons.push('🔥');
      const inj = injuries.some(i=> c.iso>=i.start && (!i.end||c.iso<=i.end));
      if(inj) icons.push('🩹');
      const rpe = dayS.length ? Math.max(...dayS.map(s=> s.rpePostPhys||0)) : 0;
      const dotColor = rpe>=9?'var(--danger)':rpe>=8?'var(--orange)':rpe>=6?'var(--warning)':rpe>0?'var(--success)':'transparent';
      const isDeload = isDeloadDate(c.iso);
      return `<div class="cal-day ${isToday?'today':''} ${isDeload?'deload':''}" onclick="openDayDetail('${c.iso}')">
        <div class="num">${c.n}</div>
        <div class="icons">${icons.join('')}</div>
        ${rpe>0?`<div class="dot" style="background:${dotColor}"></div>`:''}
      </div>`;
    }).join('')}
  </div>
  <div class="muted small mt">Punkt-Farbe: RPE-Nachher (Grün ≤5, Gelb 6-7, Orange 8, Rot ≥9). Blau hinterlegt = Deload-Woche.</div>
  `;
}
function changeMonth(d){
  let m = State.cal.m + d, y = State.cal.y;
  if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
  State.cal = {y,m}; render();
}
function isDeloadDate(iso){
  const s = Store.get('settings', DEFAULT_SETTINGS);
  if(!s.meso.startDate) return false;
  const start = new Date(s.meso.startDate+'T00:00:00');
  const date = new Date(iso+'T00:00:00');
  const days = Math.floor((date-start)/(86400000));
  if(days<0) return false;
  const week = Math.floor(days/7) % s.meso.length;
  return s.meso.deloadWeeks?.includes(week);
}
function openDayDetail(iso){
  const sessions = Store.get('sessions',[]).filter(s=>s.date===iso);
  const injuries = Store.get('injuries',[]).filter(i=> iso>=i.start && (!i.end||iso<=i.end));
  openModal(`<div class="sheet">
    <h2>${fmtDate(iso)}<button class="close" onclick="closeModal()">×</button></h2>
    ${sessions.length===0 && injuries.length===0
      ? `<div class="empty-state"><div class="em">📭</div>Kein Eintrag für diesen Tag.</div>`
      : ''}

}
function renderSessionDetailHtml(s){
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));

    ${s.note ? `<div class="muted small mt">📝 ${escHtml(s.note)}</div>`:''}
    ${s.blocks.filter(b=>b.exercises.length).map(b=>`
      <div class="mt"><strong class="small">${escHtml(b.name)}</strong>
        ${b.exercises.map(ex=>{
          if(ex.type==='strength') return `<div class="small muted">• ${escHtml(ex.name)}: ${ex.sets.length} Sätze${
            ex.sets[0]?.weight?', max '+Math.max(...ex.sets.map(s=>s.weight||0))+'kg':''}</div>`;
          if(ex.type==='climb') return `<div class="small muted">• ${escHtml(ex.name)}: ${ex.problems.length} Probleme${
            ex.problems.length?', '+ex.problems.filter(p=>p.result==='Send'||p.result==='Flash').length+' Sends':''}</div>`;
          if(ex.type==='hangboard') return `<div class="small muted">• ${escHtml(ex.name)}: ${ex.protocols.length} Protokolle</div>`;
          if(ex.type==='run'||ex.type==='bike'){
            const c=ex.cardio||{}; return `<div class="small muted">• ${escHtml(ex.name)}: ${c.distance||0} km${c.time?', '+c.time:''}</div>`;
          }
          return `<div class="small muted">• ${escHtml(ex.name)}</div>`;
        }).join('')}
      </div>`).join('')}
  </div>`;
}
function deleteSession(id){
  confirmDialog('Session löschen?','Dieser Eintrag wird gelöscht.', ()=>{
    Store.set('sessions', Store.get('sessions',[]).filter(s=>s.id!==id));
    closeModal(); render(); toast('Session gelöscht');
  }, {danger:true, yesLabel:'Löschen'});
}

   Section: STATS
============================================================ */

function afterStats(){

function filteredSessions(){

  if(_statsRange==='9999') return all;

  return all.filter(s=> s.date>=cutoff);
}

  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    if(ex.type!=='strength' || !ex.sets?.length) return;
    byEx[ex.refId] = byEx[ex.refId] || {name: ex.name, points:[]};
    const maxW = Math.max(...ex.sets.map(x=>x.weight||0));
    const bestSet = ex.sets.find(x=>(x.weight||0)===maxW) || ex.sets[0];
    const reps = (bestSet.wReps||0) + (bestSet.bReps||0);
    byEx[ex.refId].points.push({date:s.date, max:maxW, e1rm: reps>0?epley(maxW,reps):maxW});

/* Chart helpers */
let _charts = {};
function destroyCharts(){
  Object.values(_charts).forEach(c=>{ try{c.destroy()}catch(e){} });
  _charts = {};
}
function chartColors(){
  const css = getComputedStyle(document.documentElement);
  return {
    text: css.getPropertyValue('--text').trim(),
    muted: css.getPropertyValue('--text-muted').trim(),
    accent: css.getPropertyValue('--accent').trim(),
    border: css.getPropertyValue('--border').trim()
  };
}
function commonChartOpts(){
  const c = chartColors();
  Chart.defaults.color = c.muted;
  Chart.defaults.borderColor = c.border;
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ labels:{color:c.muted} } },
    scales:{
      x:{ grid:{color:c.border}, ticks:{color:c.muted} },
      y:{ grid:{color:c.border}, ticks:{color:c.muted}, beginAtZero:true }
    }
  };
}
function weeksMap(sessions, weeks=12){
  const map = {};
  for(let i=weeks-1;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i*7);
    const day = (d.getDay()+6)%7; d.setDate(d.getDate()-day);
    map[d.toISOString().slice(0,10)] = 0;
  }
  return map;
}
function buildFreqChart(sessions){
  destroyChart('ch-freq');
  const map = weeksMap(sessions, 12);
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00');
    const day = (d.getDay()+6)%7; d.setDate(d.getDate()-day);
    const k = d.toISOString().slice(0,10); if(k in map) map[k]++;
  });
  const ctx = document.getElementById('ch-freq'); if(!ctx) return;
  _charts['ch-freq'] = new Chart(ctx, {type:'bar', data:{
    labels: Object.keys(map).map(k=>fmtDateShort(k)),
    datasets:[{label:'Sessions', data:Object.values(map),
      backgroundColor: chartColors().accent}]

}

function buildStrengthCharts(sessions){
  destroyChart('ch-strength'); destroyChart('ch-volume');
  const byEx = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    if(ex.type!=='strength' || !ex.sets?.length) return;
    byEx[ex.refId] = byEx[ex.refId] || {name: ex.name, points:[]};
    const maxW = Math.max(...ex.sets.map(x=>x.weight||0));
    const bestSet = ex.sets.find(x=>(x.weight||0)===maxW) || ex.sets[0];
    const reps = (bestSet.wReps||0) + (bestSet.bReps||0);
    byEx[ex.refId].points.push({date:s.date, max:maxW, e1rm: reps>0?epley(maxW,reps):maxW});
  })));
  const exIds = Object.keys(byEx);
  const sel = document.getElementById('strength-pick');
  if(sel){
    const id = window._strengthPick || sel.value || exIds[0];
    sel.onchange = (e)=>{ window._strengthPick = e.target.value; buildStrengthCharts(sessions); };

      if(ctx) _charts['ch-strength'] = new Chart(ctx, {type:'line', data:{
        labels: pts.map(p=>fmtDateShort(p.date)),
        datasets:[
          {label:'Max Gewicht', data: pts.map(p=>p.max), borderColor:'#3da5ff', backgroundColor:'transparent', tension:.25},
          {label:'1RM (Epley)', data: pts.map(p=>+p.e1rm.toFixed(1)), borderColor:'#a78bfa', backgroundColor:'transparent', borderDash:[4,4], tension:.25}
        ]}, options: commonChartOpts()});
    }
  }
  // volume per muscle group / week
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  const weeks = weeksMap(sessions, 12);
  const byMG = {};
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day);
    const k = d.toISOString().slice(0,10); if(!(k in weeks)) return;
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      if(ex.type!=='strength') return;
      const ms = (exMap[ex.refId]?.muscles)||ex.muscles||['Sonstige'];
      let vol = 0;
      ex.sets?.forEach(st=>{ vol += (st.weight||0) * ((st.wReps||0)+(st.bReps||0)); });
      ms.forEach(m=>{
        byMG[m] = byMG[m] || {};
        byMG[m][k] = (byMG[m][k]||0) + vol/ms.length;
      });
    }));
  });
  const labels = Object.keys(weeks).map(fmtDateShort);
  const palette = ['#3da5ff','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#f472b6','#22d3ee'];
  const datasets = Object.entries(byMG).slice(0,6).map(([m,wk],i)=>({
    label: m, data: Object.keys(weeks).map(k=> Math.round(wk[k]||0)),
    backgroundColor: palette[i%palette.length], stack:'v'
  }));
  const ctx2 = document.getElementById('ch-volume');
  if(ctx2) _charts['ch-volume'] = new Chart(ctx2, {type:'bar', data:{labels, datasets},
    options: Object.assign(commonChartOpts(), {scales:{x:{stacked:true, grid:{color:chartColors().border}, ticks:{color:chartColors().muted}}, y:{stacked:true, grid:{color:chartColors().border}, ticks:{color:chartColors().muted}}}})});
}
function buildClimbCharts(sessions){
  destroyChart('ch-sends'); destroyChart('ch-flash'); destroyChart('ch-holds'); destroyChart('ch-where');
  // Pyramide
  const counts = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{
      if(p.discipline && p.discipline!=='Boulder') return;
      counts[p.grade] = counts[p.grade] || {Flash:0, Send:0, Top:0, Attempt:0, Projekt:0};
      counts[p.grade][p.result] = (counts[p.grade][p.result]||0) + (p.attempts||1);
    });
  })));
  const grades = FB_GRADES.filter(g=>counts[g]);
  const max = Math.max(1, ...grades.map(g=>{
    const c = counts[g]; return c.Flash+c.Send+c.Top+c.Attempt;
  }));
  const py = document.getElementById('boulder-pyramid');
  if(py) py.innerHTML = grades.length===0
    ? '<div class="muted small">Keine Boulder im Zeitraum.</div>'
    : grades.reverse().map(g=>{
        const c = counts[g], total = c.Flash+c.Send+c.Top+c.Attempt;
        return `<div class="pyramid-row">
          <div class="grade">${escHtml(g)}</div>
          <div class="bar" style="width:${total/max*100}%">
            ${c.Flash?`<div class="seg flash" style="width:${c.Flash/total*100}%">${c.Flash}</div>`:''}
            ${c.Send?`<div class="seg send" style="width:${c.Send/total*100}%">${c.Send}</div>`:''}
            ${c.Top?`<div class="seg top" style="width:${c.Top/total*100}%">${c.Top}</div>`:''}
            ${c.Attempt?`<div class="seg attempt" style="width:${c.Attempt/total*100}%">${c.Attempt}</div>`:''}
          </div>
          <div class="muted small">${total}</div>
        </div>`;
      }).join('') + `<div class="muted small mt">Legende: <span class="badge warn">Flash</span> <span class="badge success">Send</span> <span class="badge">Top</span> <span class="badge">Attempt</span></div>`;

  // Sends pro Grad über Zeit (line per grade)
  const byMonth = {};
  sessions.forEach(s=>{
    const m = s.date.slice(0,7);
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      ex.problems?.forEach(p=>{
        if(!['Flash','Send'].includes(p.result)) return;
        byMonth[m] = byMonth[m] || {};
        byMonth[m][p.grade] = (byMonth[m][p.grade]||0)+1;
      });
    }));
  });
  const months = Object.keys(byMonth).sort();
  const allGrades = Array.from(new Set(months.flatMap(m=>Object.keys(byMonth[m])))).sort((a,b)=>FB_GRADES.indexOf(a)-FB_GRADES.indexOf(b));
  const palette2 = ['#3da5ff','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#f472b6','#22d3ee'];
  const ds = allGrades.map((g,i)=>({label:g, data: months.map(m=>byMonth[m][g]||0),
    borderColor: palette2[i%palette2.length], backgroundColor:'transparent', tension:.25}));
  const ctx = document.getElementById('ch-sends');
  if(ctx) _charts['ch-sends'] = new Chart(ctx, {type:'line', data:{labels:months, datasets:ds},
    options: commonChartOpts()});

  // Flash rate
  const fr = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{
      fr[p.grade] = fr[p.grade] || {flash:0,total:0};
      fr[p.grade].total++;
      if(p.result==='Flash') fr[p.grade].flash++;
    });
  })));
  const fGrades = Object.keys(fr).sort((a,b)=>FB_GRADES.indexOf(a)-FB_GRADES.indexOf(b));
  const ctx2 = document.getElementById('ch-flash');
  if(ctx2) _charts['ch-flash'] = new Chart(ctx2, {type:'bar', data:{
    labels:fGrades, datasets:[{label:'Flash %',
      data:fGrades.map(g=> fr[g].total?Math.round(fr[g].flash/fr[g].total*100):0),
      backgroundColor:chartColors().accent}]
  }, options: commonChartOpts()});

  // Holds
  const hCount = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{ (p.holds||[]).forEach(h=> hCount[h]=(hCount[h]||0)+1); });
  })));
  const hctx = document.getElementById('ch-holds');
  if(hctx) _charts['ch-holds'] = new Chart(hctx, {type:'doughnut', data:{
    labels: Object.keys(hCount), datasets:[{data: Object.values(hCount),
      backgroundColor: palette2}]
  }, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right', labels:{color:chartColors().muted}}}}});

  // Where
  let indoor=0, outdoor=0;
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{ if(p.where==='indoor') indoor+=p.attempts||1; else if(p.where==='outdoor') outdoor+=p.attempts||1; });
  })));
  const wctx = document.getElementById('ch-where');
  if(wctx) _charts['ch-where'] = new Chart(wctx, {type:'pie', data:{
    labels:['Indoor','Outdoor'], datasets:[{data:[indoor,outdoor],
      backgroundColor:[chartColors().accent,'#fbbf24']}]
  }, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:chartColors().muted}}}}});
}

function buildEnduranceCharts(sessions){
  destroyChart('ch-runkm'); destroyChart('ch-pace'); destroyChart('ch-bikekm'); destroyChart('ch-bikekmh');
  const weeks = weeksMap(sessions, 12);
  const runWk = {...weeks}, bikeWk = {...weeks};
  const runPace = [], bikeKmh = [];
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day);
    const k = d.toISOString().slice(0,10);
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      const c = ex.cardio; if(!c) return;
      if(ex.type==='run' && c.distance){
        runWk[k] = (runWk[k]||0) + c.distance;
        const parts = (c.time||'').split(':').map(Number);
        const secs = parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:0;
        if(secs>0 && c.distance>0){
          const pace = (secs/c.distance)/60;
          runPace.push({date:s.date, val:+pace.toFixed(2)});
        }
      }
      if(ex.type==='bike' && c.distance){
        bikeWk[k] = (bikeWk[k]||0) + c.distance;
        const parts = (c.time||'').split(':').map(Number);
        const secs = parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:0;
        if(secs>0 && c.distance>0){
          const kmh = c.distance/(secs/3600);
          bikeKmh.push({date:s.date, val:+kmh.toFixed(1)});
        }
      }
    }));
  });
  const labels = Object.keys(weeks).map(fmtDateShort);
  function lineChart(id, label, data, color){
    const ctx = document.getElementById(id); if(!ctx) return;
    _charts[id] = new Chart(ctx, {type:'bar', data:{labels, datasets:[{label, data:Object.values(data), backgroundColor:color}]}, options:commonChartOpts()});
  }
  lineChart('ch-runkm', 'km', runWk, '#3da5ff');
  lineChart('ch-bikekm', 'km', bikeWk, '#34d399');
  function pointChart(id, label, pts, color){
    const ctx = document.getElementById(id); if(!ctx) return;
    _charts[id] = new Chart(ctx, {type:'line', data:{
      labels: pts.map(p=>fmtDateShort(p.date)),
      datasets:[{label, data: pts.map(p=>p.val), borderColor:color, backgroundColor:'transparent', tension:.25}]}, options: commonChartOpts()});
  }
  pointChart('ch-pace', 'min/km', runPace, '#f87171');
  pointChart('ch-bikekmh', 'km/h', bikeKmh, '#fbbf24');
}
</script>
<script>
/* ============================================================
   Section: LIBRARY (Exercises + Blocks)
============================================================ */
function renderLibrary(){
  return `
  <div class="tabs">
    <button class="${State.libTab==='exercises'?'active':''}" onclick="State.libTab='exercises';render()">Übungen</button>
    <button class="${State.libTab==='blocks'?'active':''}" onclick="State.libTab='blocks';render()">Blöcke</button>
  </div>
  ${State.libTab==='exercises'?renderLibExercises():renderLibBlocks()}`;
}
function renderLibExercises(){
  const ex = Store.get('exercises',[]);
  const types = {strength:'💪 Kraft', climb:'🧗 Klettern', hangboard:'✊ Hangboard',
    run:'🏃 Laufen', bike:'🚴 Rad', mobility:'🤸 Mobility'};
  return `
  <div class="row mb"><button class="btn primary block" onclick="openEditExercise()">+ Neue Übung</button></div>
  ${Object.keys(types).map(t=>{
    const list = ex.filter(e=>e.type===t);
    if(!list.length) return '';
    return `<div class="card"><h3>${types[t]}</h3>
      ${list.map(e=>`<div class="list-item">
        <div style="flex:1">
          <div style="font-weight:600">${escHtml(e.name)}</div>
          <div class="muted small">${(e.muscles||[]).join(', ')||'—'}${e.note?' · '+escHtml(e.note):''}</div>
        </div>
        <button class="btn sm" onclick="openEditExercise('${e.id}')">✎</button>
        <button class="x-btn" onclick="deleteExercise('${e.id}')">×</button>
      </div>`).join('')}
    </div>`;
  }).join('')}
  `;
}
function openEditExercise(id){
  const ex = id ? Store.get('exercises',[]).find(e=>e.id===id) : {name:'',type:'strength',muscles:[],note:''};
  if(!ex) return;
  openModal(`<div class="sheet">
    <h2>${id?'Übung bearbeiten':'Neue Übung'}<button class="close" onclick="closeModal()">×</button></h2>
    <span class="label">Name</span><input id="ee-n" value="${escHtml(ex.name)}">
    <span class="label">Typ</span>
    <select id="ee-t">
      ${[['strength','Kraft'],['climb','Klettern'],['hangboard','Hangboard'],
         ['run','Laufen'],['bike','Radfahren'],['mobility','Mobility']]
         .map(([v,l])=>`<option value="${v}" ${ex.type===v?'selected':''}>${l}</option>`).join('')}
    </select>
    <span class="label">Muskelgruppen</span>
    <div class="tag-list" id="ee-m">
      ${MUSCLE_GROUPS.map(m=>{
        const on = (ex.muscles||[]).includes(m);
        return `<span class="chip chip-btn ${on?'on':''}" data-m="${m}" onclick="this.classList.toggle('on')">${m}</span>`;
      }).join('')}
    </div>
    <span class="label">Notiz</span><textarea id="ee-note">${escHtml(ex.note||'')}</textarea>
    <div class="row mt">
      <button class="btn ghost block" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary block" onclick="saveExercise('${id||''}')">Speichern</button>
    </div></div>`);
}
function saveExercise(id){
  const name = document.getElementById('ee-n').value.trim();
  const type = document.getElementById('ee-t').value;
  const muscles = Array.from(document.querySelectorAll('#ee-m .chip.on')).map(c=>c.dataset.m);
  const note = document.getElementById('ee-note').value.trim();
  if(!name) return toast('Name fehlt');
  const list = Store.get('exercises',[]);
  if(id){
    const idx = list.findIndex(e=>e.id===id);
    if(idx>=0) list[idx] = Object.assign(list[idx], {name,type,muscles,note});
  } else list.push({id:uid('ex'), name, type, muscles, note});
  Store.set('exercises', list); closeModal(); render();
}
function deleteExercise(id){
  confirmDialog('Übung löschen?','Verbleibende Logs bleiben erhalten.',()=>{
    Store.set('exercises', Store.get('exercises',[]).filter(e=>e.id!==id));
    render(); toast('Gelöscht');
  },{danger:true,yesLabel:'Löschen'});
}
function renderLibBlocks(){
  const blocks = Store.get('blocks',[]);
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  return `
  <div class="row mb"><button class="btn primary block" onclick="openEditBlock()">+ Neuer Block</button></div>
  ${blocks.length===0
    ? `<div class="empty-state"><div class="em">📦</div>Lege Blöcke an, um Übungsgruppen mit einem Tap einzufügen.</div>`
    : blocks.map(b=>`<div class="card">
        <div class="card-row">
          <h3>${escHtml(b.name)}</h3>
          <div>
            <button class="btn sm" onclick="openEditBlock('${b.id}')">✎</button>
            <button class="x-btn" onclick="deleteBlock('${b.id}')">×</button>
          </div>
        </div>
        <div class="muted small">Typ: ${escHtml(b.type||'—')}</div>
        <div class="mt">
          ${b.exerciseIds.map(eid=>`<span class="chip">${escHtml(exMap[eid]?.name||'?')}</span>`).join(' ')||'<span class="muted small">Leer</span>'}
        </div>
      </div>`).join('')}
  `;
}
function openEditBlock(id){
  const blk = id ? Store.get('blocks',[]).find(b=>b.id===id) : {name:'',type:'strength',exerciseIds:[]};
  if(!blk) return;
  const exAll = Store.get('exercises',[]);
  openModal(`<div class="sheet">
    <h2>${id?'Block bearbeiten':'Neuer Block'}<button class="close" onclick="closeModal()">×</button></h2>
    <span class="label">Name</span><input id="bk-n" value="${escHtml(blk.name)}">
    <span class="label">Typ</span>
    <select id="bk-t">
      ${[['warmup','Warm-up'],['strength','Kraft'],['climb','Klettern'],['cooldown','Cool-down'],['mobility','Mobility']]
        .map(([v,l])=>`<option value="${v}" ${blk.type===v?'selected':''}>${l}</option>`).join('')}
    </select>
    <span class="label">Übungen</span>
    <div id="bk-ex" style="max-height:40vh;overflow-y:auto">
      ${exAll.map(e=>{
        const on = (blk.exerciseIds||[]).includes(e.id);
        return `<label class="list-item" style="cursor:pointer">
          <input type="checkbox" data-id="${e.id}" ${on?'checked':''} style="width:auto;margin-right:8px">
          <div><div style="font-weight:600">${escHtml(e.name)}</div>
            <div class="muted small">${(e.muscles||[]).join(', ')||e.type}</div></div>
        </label>`;
      }).join('')}
    </div>
    <div class="row mt">
      <button class="btn ghost block" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary block" onclick="saveBlock('${id||''}')">Speichern</button>
    </div></div>`);
}
function saveBlock(id){
  const name = document.getElementById('bk-n').value.trim();
  const type = document.getElementById('bk-t').value;
  const exIds = Array.from(document.querySelectorAll('#bk-ex input:checked')).map(i=>i.dataset.id);
  if(!name) return toast('Name fehlt');
  const list = Store.get('blocks',[]);
  if(id){
    const idx = list.findIndex(b=>b.id===id);
    if(idx>=0) list[idx] = Object.assign(list[idx], {name,type,exerciseIds:exIds});
  } else list.push({id:uid('bk'), name, type, exerciseIds: exIds});
  Store.set('blocks', list); closeModal(); render();
}
function deleteBlock(id){
  confirmDialog('Block löschen?','Verwendete Sessions bleiben unverändert.',()=>{
    Store.set('blocks', Store.get('blocks',[]).filter(b=>b.id!==id));
    render(); toast('Gelöscht');
  },{danger:true,yesLabel:'Löschen'});
}

/* ============================================================
   Section: INJURIES
============================================================ */
const BODY_AREAS = [
  'Finger A1 Pulley','Finger A2 Pulley','Finger A3 Pulley','Finger A4 Pulley',
  'Ringfinger','Mittelfinger','Zeigefinger','Kleiner Finger',
  'Schulter links','Schulter rechts',
  'Ellenbogen Epicondylitis lat. links','Ellenbogen Epicondylitis lat. rechts',
  'Ellenbogen Epicondylitis med. links','Ellenbogen Epicondylitis med. rechts',
  'Handgelenk links','Handgelenk rechts',
  'Knie links','Knie rechts','Rücken LWS','Rücken BWS','Sonstiges'
];
function renderInjuries(){
  const all = Store.get('injuries',[]);
  const list = State.injuryView==='active' ? all.filter(i=>i.status==='aktiv') : all;
  return `
  <div class="row mb">
    <div class="tabs" style="margin:0;flex:1">
      <button class="${State.injuryView==='active'?'active':''}" onclick="State.injuryView='active';render()">Aktiv</button>
      <button class="${State.injuryView==='all'?'active':''}" onclick="State.injuryView='all';render()">Alle</button>
    </div>
    <button class="btn primary" onclick="openEditInjury()">+ Neu</button>
  </div>
  ${list.length===0
    ? `<div class="empty-state"><div class="em">💪</div>Keine ${State.injuryView==='active'?'aktiven':''} Verletzungen. Bleib gesund!</div>`
    : list.map(i=>`<div class="card">
        <div class="card-row">
          <div>
            <h3>${escHtml(i.diagnosis||i.area)} ${i.status==='aktiv'?`<span class="badge danger">Aktiv</span>`:`<span class="badge success">Abgeklungen</span>`}</h3>
            <div class="muted small">${escHtml(i.area)} · Schwere ${i.severity}/5</div>
          </div>
          <div>
            <button class="btn sm" onclick="openEditInjury('${i.id}')">✎</button>
            <button class="x-btn" onclick="deleteInjury('${i.id}')">×</button>
          </div>
        </div>
        <div class="muted small mt">${fmtDate(i.start)}${i.end?' – '+fmtDate(i.end):' – läuft'}</div>
        ${i.treatment?`<div class="mt small">🩺 ${escHtml(i.treatment)}</div>`:''}
        ${i.pauseDays?`<div class="muted small">Trainingspause: ${i.pauseDays} Tage</div>`:''}
      </div>`).join('')}
  `;
}
function openEditInjury(id){
  const inj = id ? Store.get('injuries',[]).find(x=>x.id===id) : {
    start: todayISO(), end: '', area:'', diagnosis:'', severity:1, status:'aktiv',
    treatment:'', pauseDays:0, bodyPart:''
  };
  if(!inj) return;
  openModal(`<div class="sheet">
    <h2>${id?'Verletzung bearbeiten':'Neuer Eintrag'}<button class="close" onclick="closeModal()">×</button></h2>
    <div class="row tight">
      <div><span class="label">Beginn</span><input type="date" id="iv-s" value="${inj.start||''}"></div>
      <div><span class="label">Ende (optional)</span><input type="date" id="iv-e" value="${inj.end||''}"></div>
    </div>
    <div class="body-tabs">
      <button class="btn sm" id="iv-tab-front" onclick="bodyTab('front')">Vorne</button>
      <button class="btn sm" id="iv-tab-back" onclick="bodyTab('back')">Hinten</button>
    </div>
    <div id="body-svg-wrap"></div>
    <span class="label">Bereich</span>
    <select id="iv-a">${BODY_AREAS.map(a=>`<option ${inj.area===a?'selected':''}>${a}</option>`).join('')}</select>
    <input id="iv-aother" placeholder="Ergänzung / Freitext" value="${escHtml(inj.areaNote||'')}" style="margin-top:6px">
    <span class="label">Diagnose</span>
    <input id="iv-d" value="${escHtml(inj.diagnosis||'')}" placeholder="z.B. A2 Pulley Strain Grad 2">
    <span class="label">Schweregrad: <span id="iv-sv-l">${inj.severity||1}</span>/5</span>
    <input type="range" id="iv-sv" min="1" max="5" value="${inj.severity||1}" oninput="document.getElementById('iv-sv-l').textContent=this.value">
    <span class="label">Status</span>
    <select id="iv-st">
      <option value="aktiv" ${inj.status==='aktiv'?'selected':''}>Aktiv</option>
      <option value="abgeklungen" ${inj.status==='abgeklungen'?'selected':''}>Abgeklungen</option>
    </select>
    <span class="label">Behandlung / Maßnahmen</span>
    <textarea id="iv-tr">${escHtml(inj.treatment||'')}</textarea>
    <span class="label">Trainingspause (Tage)</span>
    <input type="number" inputmode="numeric" id="iv-pd" value="${inj.pauseDays||0}">
    <div class="row mt">
      <button class="btn ghost block" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary block" onclick="saveInjury('${id||''}')">Speichern</button>
    </div></div>`);
  bodyTab('front', inj.bodyPart);
}
function bodyTab(side, sel){
  document.getElementById('body-svg-wrap').innerHTML = renderBodySvg(side, sel||window._bodyPart);
  document.getElementById('iv-tab-front').classList.toggle('primary', side==='front');
  document.getElementById('iv-tab-back').classList.toggle('primary', side==='back');
}
function renderBodySvg(side, sel){
  const parts = side==='front' ? [
    {id:'head', x:75,y:18,r:14, label:'Kopf'},
    {id:'shoulderL', x:50,y:40,r:8, label:'Schulter links'},
    {id:'shoulderR', x:100,y:40,r:8, label:'Schulter rechts'},
    {id:'chest', x:75,y:55,r:14, label:'Brust'},
    {id:'elbowL', x:38,y:65,r:6, label:'Ellenbogen links'},
    {id:'elbowR', x:112,y:65,r:6, label:'Ellenbogen rechts'},
    {id:'wristL', x:30,y:90,r:5, label:'Handgelenk links'},
    {id:'wristR', x:120,y:90,r:5, label:'Handgelenk rechts'},
    {id:'fingerL', x:25,y:103,r:4, label:'Finger links'},
    {id:'fingerR', x:125,y:103,r:4, label:'Finger rechts'},
    {id:'core', x:75,y:80,r:11, label:'Core'},
    {id:'kneeL', x:62,y:140,r:6, label:'Knie links'},
    {id:'kneeR', x:88,y:140,r:6, label:'Knie rechts'}
  ] : [
    {id:'neck', x:75,y:30,r:8, label:'Nacken'},
    {id:'shoulderBL', x:50,y:45,r:8, label:'Schulter links (B)'},
    {id:'shoulderBR', x:100,y:45,r:8, label:'Schulter rechts (B)'},
    {id:'bws', x:75,y:65,r:11, label:'BWS Rücken'},
    {id:'lws', x:75,y:88,r:11, label:'LWS Rücken'},
    {id:'glutes', x:75,y:108,r:13, label:'Gesäß'},
    {id:'hamL', x:62,y:130,r:7, label:'Hamstring links'},
    {id:'hamR', x:88,y:130,r:7, label:'Hamstring rechts'}
  ];
  return `<svg class="body-svg" viewBox="0 0 150 175">
    <path d="M75 8 Q90 8 92 24 Q108 28 110 50 L120 100 L115 160 L95 168 L82 100 L75 100 L68 100 L55 168 L35 160 L30 100 L40 50 Q42 28 58 24 Q60 8 75 8 Z"/>
    ${parts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="${p.r}"
      class="${sel===p.id?'selected':''}" data-id="${p.id}" data-label="${p.label}"
      onclick="pickBody('${p.id}','${p.label}')"><title>${p.label}</title></circle>`).join('')}
  </svg>`;
}
function pickBody(id, label){
  window._bodyPart = id;
  document.querySelectorAll('.body-svg circle').forEach(c=>c.classList.toggle('selected', c.dataset.id===id));
  // also pre-fill area select if matches
  const sel = document.getElementById('iv-a');
  if(sel) for(const o of sel.options) if(o.value.toLowerCase().includes(label.toLowerCase().split(' ')[0])){ sel.value = o.value; break; }
}
function saveInjury(id){
  const obj = {
    id: id||uid('inj'),
    start: document.getElementById('iv-s').value,
    end: document.getElementById('iv-e').value || null,
    area: document.getElementById('iv-a').value,
    areaNote: document.getElementById('iv-aother').value,
    bodyPart: window._bodyPart||'',
    diagnosis: document.getElementById('iv-d').value,
    severity: +document.getElementById('iv-sv').value,
    status: document.getElementById('iv-st').value,
    treatment: document.getElementById('iv-tr').value,
    pauseDays: +document.getElementById('iv-pd').value||0
  };
  if(!obj.start) return toast('Datum fehlt');
  const list = Store.get('injuries',[]);
  const idx = id ? list.findIndex(x=>x.id===id) : -1;
  if(idx>=0) list[idx] = obj; else list.push(obj);
  Store.set('injuries', list); closeModal(); render();
}
function deleteInjury(id){
  confirmDialog('Eintrag löschen?','Verletzungs-Log wird entfernt.',()=>{
    Store.set('injuries', Store.get('injuries',[]).filter(x=>x.id!==id));
    render(); toast('Gelöscht');
  },{danger:true,yesLabel:'Löschen'});
}

   Section: SETTINGS
============================================================ */
function renderSettings(){
  const s = Store.get('settings', DEFAULT_SETTINGS);
  return `
  <div class="card">
    <h3>Profil</h3>
    <span class="label">Name</span>
    <input value="${escHtml(s.username)}" oninput="updSetting('username',this.value)">

  <div class="card">
    <h3>Einheiten</h3>

      <div><span class="label">Gewicht</span>
        <select onchange="updSetting2('units','weight',this.value)">
          <option ${s.units.weight==='kg'?'selected':''} value="kg">kg</option>
          <option ${s.units.weight==='lbs'?'selected':''} value="lbs">lbs</option>
        </select></div>
      <div><span class="label">Distanz</span>
        <select onchange="updSetting2('units','distance',this.value)">
          <option ${s.units.distance==='km'?'selected':''} value="km">km</option>
          <option ${s.units.distance==='miles'?'selected':''} value="miles">miles</option>
        </select></div>
    </div>
  </div>

  <div class="card">
    <h3>Hallen-Liste</h3>
    <div class="muted small mb">Wird beim Indoor-Bouldern angeboten.</div>
    <div id="halls-list">
      ${Store.get('halls',[]).map((h,i)=>`<div class="list-item">
        <input value="${escHtml(h)}" onchange="updHall(${i},this.value)">
        <button class="x-btn" onclick="rmHall(${i})">×</button>
      </div>`).join('')}
    </div>
    <div class="row mt"><button class="btn block" onclick="addHall()">+ Halle</button></div>
  </div>

  <div class="card">
    <h3>Mesozyklus</h3>
    <div class="row">
      <div><span class="label">Länge (Wochen)</span>
        <input type="number" inputmode="numeric" min="2" max="8" value="${s.meso.length}" oninput="updMeso('length',+this.value)"></div>
      <div><span class="label">Aktuelle Woche</span>
        <input type="number" inputmode="numeric" min="1" max="${s.meso.length}" value="${s.meso.currentWeek}" oninput="updMeso('currentWeek',+this.value)"></div>
    </div>
    <div class="row mt">
      <div><span class="label">Phase</span>
        <input value="${escHtml(s.meso.phase)}" oninput="updMeso('phase',this.value)" placeholder="z.B. Kraftaufbau"></div>
      <div><span class="label">Startdatum</span>
        <input type="date" value="${s.meso.startDate||''}" onchange="updMeso('startDate',this.value)"></div>
    </div>
    <div class="mt">
      <span class="label">Deload-Wochen (Index 0…${s.meso.length-1})</span>
      <input value="${(s.meso.deloadWeeks||[]).join(',')}" onchange="updDeload(this.value)" placeholder="z.B. 3">
    </div>
    <div class="row mt">
      <button class="btn block" onclick="newMeso()">Neuen Zyklus starten (alten archivieren)</button>
    </div>
  </div>

  <div class="card">
    <h3>Wochenziele</h3>
    <div class="row">
      <div><span class="label">Einheiten / Woche</span>
        <input type="number" inputmode="numeric" min="1" max="14" value="${s.goals.sessionsPerWeek}" oninput="updGoals('sessionsPerWeek',+this.value)"></div>
      <div><span class="label">Ziel-Boulder-Grad</span>
        <select onchange="updGoals('targetGrade',this.value)">
          ${FB_GRADES.map(g=>`<option ${s.goals.targetGrade===g?'selected':''}>${g}</option>`).join('')}
        </select></div>
    </div>
  </div>

  <div class="card">
    <h3>Pausen-Timer</h3>
    <div class="row">
      <div><span class="label">Standard-Dauer (s)</span>
        <input type="number" inputmode="numeric" min="10" max="600" value="${s.restTimerSeconds}" oninput="updSetting('restTimerSeconds',+this.value)"></div>
      <div><span class="label">Beep am Ende</span>
        <label class="switch" style="margin-top:8px"><input type="checkbox" ${s.beepEnabled?'checked':''} onchange="updSetting('beepEnabled',this.checked)"><span></span></label></div>
    </div>
  </div>

  <div class="card">
    <h3>Theme</h3>
    <div class="row">
      <button class="btn block ${s.theme==='dark'?'primary':''}" onclick="updSetting('theme','dark');applyTheme();render()">🌙 Dunkel</button>

    </div>
  </div>

  <div class="card">
    <h3>Daten</h3>
    <div class="row">
      <button class="btn block" onclick="exportData()">⬇ Export (JSON)</button>
      <button class="btn block" onclick="document.getElementById('import-file').click()">⬆ Import</button>
    </div>
    <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(this)">
    <div class="row mt">
      <button class="btn danger block" onclick="askResetData()">Alle Daten löschen…</button>
    </div>
    <div class="muted small mt">PWA: Installiere PeakTrack über das Browser-Menü „Zum Home-Screen hinzufügen".</div>
  </div>

  <div class="card">
    <h3>Über</h3>
    <div class="muted small">PeakTrack v1.0 · Single-File Vanilla JS · Daten werden ausschließlich lokal in deinem Browser gespeichert.</div>
  </div>
  `;
}
function updSetting(k,v){
  const s = Store.get('settings', DEFAULT_SETTINGS); s[k]=v; Store.set('settings',s);
}
function updSetting2(a,b,v){
  const s = Store.get('settings', DEFAULT_SETTINGS); s[a]=s[a]||{}; s[a][b]=v; Store.set('settings',s);
}
function updMeso(k,v){
  const s = Store.get('settings', DEFAULT_SETTINGS); s.meso[k]=v; Store.set('settings',s);
}
function updGoals(k,v){
  const s = Store.get('settings', DEFAULT_SETTINGS); s.goals[k]=v; Store.set('settings',s);
}
function updDeload(v){
  const arr = v.split(',').map(s=>+s.trim()).filter(n=>!isNaN(n));
  const s = Store.get('settings',DEFAULT_SETTINGS); s.meso.deloadWeeks = arr; Store.set('settings', s);
}
function newMeso(){
  confirmDialog('Neuen Zyklus starten?','Der aktuelle wird mit Datum archiviert.',()=>{
    const s = Store.get('settings', DEFAULT_SETTINGS);
    const archive = Store.get('archivedMesos',[]);
    archive.push({ ...s.meso, archivedAt: todayISO() });
    Store.set('archivedMesos', archive);
    s.meso.currentWeek = 1; s.meso.startDate = todayISO();
    Store.set('settings', s); render(); toast('Neuer Zyklus gestartet');
  },{});
}
function addHall(){
  const list = Store.get('halls',[]); list.push('Neue Halle'); Store.set('halls', list); render();
}
function updHall(i,v){
  const list = Store.get('halls',[]); list[i] = v; Store.set('halls', list);
}
function rmHall(i){
  const list = Store.get('halls',[]); list.splice(i,1); Store.set('halls', list); render();
}
function exportData(){
  const data = Store.exportAll();
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `peaktrack-export-${todayISO()}.json`;
  a.click(); setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Export gestartet');
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const obj = JSON.parse(r.result);
      confirmDialog('Daten importieren?','Bestehende Daten werden überschrieben.',()=>{
        Store.importAll(obj); applyTheme(); render(); toast('Import erfolgreich');
      },{});
    }catch(e){ toast('Datei ungültig: '+e.message); }
  };
  r.readAsText(f);
  input.value = '';
}
function askResetData(){
  confirmDialog('Wirklich ALLE Daten löschen?','Erste Bestätigung – Schritt 1 von 2.',()=>{
    confirmDialog('Endgültig löschen?','Diese Aktion kann nicht rückgängig gemacht werden.',()=>{
      Store.clearAll(); initData(); applyTheme(); render(); toast('Alle Daten gelöscht');
    },{danger:true, yesLabel:'Endgültig löschen'});
  },{danger:true, yesLabel:'Weiter'});
}

/* ============================================================
   PWA: Service Worker + Manifest as Blob URLs
============================================================ */
function setupPWA(){
  // Manifest
  const manifest = {
    name:'PeakTrack – Training & Bouldern', short_name:'PeakTrack',
    description:'Trainings-Tracker für Bouldern, Klettern, Kraft, Lauf & Rad.',
    display:'standalone', orientation:'portrait',
    start_url:'.', scope:'.',
    theme_color:'#0b1220', background_color:'#0b1220',
    icons:[{
      src:'data:image/svg+xml;utf8,'+encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
          <rect width="192" height="192" rx="32" fill="#0b1220"/>
          <path d="M40 140 L80 80 L100 110 L130 60 L160 140 Z" fill="#3da5ff"/>
          <circle cx="130" cy="55" r="10" fill="#fbbf24"/>
        </svg>`),
      sizes:'192x192', type:'image/svg+xml', purpose:'any'
    }]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const mUrl = URL.createObjectURL(mBlob);
  const link = document.createElement('link');
  link.rel='manifest'; link.href = mUrl; document.head.appendChild(link);

  // Service worker (best-effort; blob SW is unsupported in many browsers,
  // so we try a same-origin SW only when served from http(s))
  if('serviceWorker' in navigator && /^https?:/.test(location.protocol)){
    const swCode = `
      const CACHE='peaktrack-v1';
      self.addEventListener('install', e=> self.skipWaiting());
      self.addEventListener('activate', e=> e.waitUntil(self.clients.claim()));
      self.addEventListener('fetch', e=>{
        if(e.request.method!=='GET') return;
        e.respondWith(
          caches.open(CACHE).then(c=>
            c.match(e.request).then(r=> r ||
              fetch(e.request).then(res=>{ try{c.put(e.request,res.clone())}catch(_){}; return res; })
              .catch(()=> c.match('/'))
            )
          )
        );
      });
    `;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{ /* ignore */ });
  }
}

/* ============================================================
   BOOT
============================================================ */
(async function boot(){
  // Cloud-Daten laden — mit 5-Sekunden-Timeout damit die App nicht hängt
  if(SCRIPT_URL){
    const ind = document.getElementById('sync-indicator');
    if(ind){ ind.textContent='☁ Lade…'; ind.style.color='var(--text-muted)'; }
    try {
      const timeout = new Promise(res => setTimeout(res, 5000));
      await Promise.race([Store.loadFromCloud(), timeout]);
    } catch(e){ console.warn('Cloud-Laden übersprungen:', e); }
    const ind2 = document.getElementById('sync-indicator');
    if(ind2){ ind2.textContent=''; }
  }
  // App starten — immer, auch wenn Cloud-Laden fehlschlug
  try { initData(); applyTheme(); render(); setupPWA(); }
  catch(e){ console.error('App-Start-Fehler:', e); }
})();
window.addEventListener('beforeunload', e=>{
  if(State.currentSession){ e.preventDefault(); e.returnValue=''; }
});
