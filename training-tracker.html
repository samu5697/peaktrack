function buildStrengthCharts(sessions){
  destroyChart('ch-strength'); destroyChart('ch-volume');
  const byEx = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    if(ex.type!=='strength' || !ex.sets?.length) return;
    byEx[ex.refId] = byEx[ex.refId] || {name: ex.name, points:[]};
    const maxW = Math.max(...ex.sets.map(x=>x.weight||0));
    const bestSet = ex.sets.find(x=>(x.weight||0)===maxW) || ex.sets[0];
    const reps = (bestSet.wReps||0) + (bestSet.bReps||0);
    byEx[ex.refId].points.push({date:s.date, max:maxW, e1rm: reps>0?epley(maxW,reps):maxW});
  })));
  const exIds = Object.keys(byEx);
  const sel = document.getElementById('strength-pick');
  if(sel){
    const id = window._strengthPick || sel.value || exIds[0];
    sel.onchange = (e)=>{ window._strengthPick = e.target.value; buildStrengthCharts(sessions); };
    if(id && byEx[id]){
      const pts = byEx[id].points.sort((a,b)=>a.date.localeCompare(b.date));
      const ctx = document.getElementById('ch-strength');
      if(ctx) _charts['ch-strength'] = new Chart(ctx, {type:'line', data:{
        labels: pts.map(p=>fmtDateShort(p.date)),
        datasets:[
          {label:'Max Gewicht', data: pts.map(p=>p.max), borderColor:'#3da5ff', backgroundColor:'transparent', tension:.25},
          {label:'1RM (Epley)', data: pts.map(p=>+p.e1rm.toFixed(1)), borderColor:'#a78bfa', backgroundColor:'transparent', borderDash:[4,4], tension:.25}
        ]}, options: commonChartOpts()});
    }
  }
  // volume per muscle group / week
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  const weeks = weeksMap(sessions, 12);
  const byMG = {};
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day);
    const k = d.toISOString().slice(0,10); if(!(k in weeks)) return;
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      if(ex.type!=='strength') return;
      const ms = (exMap[ex.refId]?.muscles)||ex.muscles||['Sonstige'];
      let vol = 0;
      ex.sets?.forEach(st=>{ vol += (st.weight||0) * ((st.wReps||0)+(st.bReps||0)); });
      ms.forEach(m=>{
        byMG[m] = byMG[m] || {};
        byMG[m][k] = (byMG[m][k]||0) + vol/ms.length;
      });
    }));
  });
  const labels = Object.keys(weeks).map(fmtDateShort);
  const palette = ['#3da5ff','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#f472b6','#22d3ee'];
  const datasets = Object.entries(byMG).slice(0,6).map(([m,wk],i)=>({
    label: m, data: Object.keys(weeks).map(k=> Math.round(wk[k]||0)),
    backgroundColor: palette[i%palette.length], stack:'v'
  }));
  const ctx2 = document.getElementById('ch-volume');
  if(ctx2) _charts['ch-volume'] = new Chart(ctx2, {type:'bar', data:{labels, datasets},
    options: Object.assign(commonChartOpts(), {scales:{x:{stacked:true, grid:{color:chartColors().border}, ticks:{color:chartColors().muted}}, y:{stacked:true, grid:{color:chartColors().border}, ticks:{color:chartColors().muted}}}})});
}
function buildClimbCharts(sessions){
  destroyChart('ch-sends'); destroyChart('ch-flash'); destroyChart('ch-holds'); destroyChart('ch-where');
  // Pyramide
  const counts = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{
      if(p.discipline && p.discipline!=='Boulder') return;
      counts[p.grade] = counts[p.grade] || {Flash:0, Send:0, Top:0, Attempt:0, Projekt:0};
      counts[p.grade][p.result] = (counts[p.grade][p.result]||0) + (p.attempts||1);
    });
  })));
  const grades = FB_GRADES.filter(g=>counts[g]);
  const max = Math.max(1, ...grades.map(g=>{
    const c = counts[g]; return c.Flash+c.Send+c.Top+c.Attempt;
  }));
  const py = document.getElementById('boulder-pyramid');
  if(py) py.innerHTML = grades.length===0
    ? '<div class="muted small">Keine Boulder im Zeitraum.</div>'
    : grades.reverse().map(g=>{
        const c = counts[g], total = c.Flash+c.Send+c.Top+c.Attempt;
        return `<div class="pyramid-row">
          <div class="grade">${escHtml(g)}</div>
          <div class="bar" style="width:${total/max*100}%">
            ${c.Flash?`<div class="seg flash" style="width:${c.Flash/total*100}%">${c.Flash}</div>`:''}
            ${c.Send?`<div class="seg send" style="width:${c.Send/total*100}%">${c.Send}</div>`:''}
            ${c.Top?`<div class="seg top" style="width:${c.Top/total*100}%">${c.Top}</div>`:''}
            ${c.Attempt?`<div class="seg attempt" style="width:${c.Attempt/total*100}%">${c.Attempt}</div>`:''}
          </div>
          <div class="muted small">${total}</div>
        </div>`;
      }).join('') + `<div class="muted small mt">Legende: <span class="badge warn">Flash</span> <span class="badge success">Send</span> <span class="badge">Top</span> <span class="badge">Attempt</span></div>`;

  // Sends pro Grad über Zeit (line per grade)
  const byMonth = {};
  sessions.forEach(s=>{
    const m = s.date.slice(0,7);
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      ex.problems?.forEach(p=>{
        if(!['Flash','Send'].includes(p.result)) return;
        byMonth[m] = byMonth[m] || {};
        byMonth[m][p.grade] = (byMonth[m][p.grade]||0)+1;
      });
    }));
  });
  const months = Object.keys(byMonth).sort();
  const allGrades = Array.from(new Set(months.flatMap(m=>Object.keys(byMonth[m])))).sort((a,b)=>FB_GRADES.indexOf(a)-FB_GRADES.indexOf(b));
  const palette2 = ['#3da5ff','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c','#f472b6','#22d3ee'];
  const ds = allGrades.map((g,i)=>({label:g, data: months.map(m=>byMonth[m][g]||0),
    borderColor: palette2[i%palette2.length], backgroundColor:'transparent', tension:.25}));
  const ctx = document.getElementById('ch-sends');
  if(ctx) _charts['ch-sends'] = new Chart(ctx, {type:'line', data:{labels:months, datasets:ds},
    options: commonChartOpts()});

  // Flash rate
  const fr = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{
      fr[p.grade] = fr[p.grade] || {flash:0,total:0};
      fr[p.grade].total++;
      if(p.result==='Flash') fr[p.grade].flash++;
    });
  })));
  const fGrades = Object.keys(fr).sort((a,b)=>FB_GRADES.indexOf(a)-FB_GRADES.indexOf(b));
  const ctx2 = document.getElementById('ch-flash');
  if(ctx2) _charts['ch-flash'] = new Chart(ctx2, {type:'bar', data:{
    labels:fGrades, datasets:[{label:'Flash %',
      data:fGrades.map(g=> fr[g].total?Math.round(fr[g].flash/fr[g].total*100):0),
      backgroundColor:chartColors().accent}]
  }, options: commonChartOpts()});

  // Holds
  const hCount = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{ (p.holds||[]).forEach(h=> hCount[h]=(hCount[h]||0)+1); });
  })));
  const hctx = document.getElementById('ch-holds');
  if(hctx) _charts['ch-holds'] = new Chart(hctx, {type:'doughnut', data:{
    labels: Object.keys(hCount), datasets:[{data: Object.values(hCount),
      backgroundColor: palette2}]
  }, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right', labels:{color:chartColors().muted}}}}});

  // Where
  let indoor=0, outdoor=0;
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    ex.problems?.forEach(p=>{ if(p.where==='indoor') indoor+=p.attempts||1; else if(p.where==='outdoor') outdoor+=p.attempts||1; });
  })));
  const wctx = document.getElementById('ch-where');
  if(wctx) _charts['ch-where'] = new Chart(wctx, {type:'pie', data:{
    labels:['Indoor','Outdoor'], datasets:[{data:[indoor,outdoor],
      backgroundColor:[chartColors().accent,'#fbbf24']}]
  }, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:chartColors().muted}}}}});
}
function buildHangboardCharts(sessions){
  destroyChart('ch-hbmax'); destroyChart('ch-hbrep');
  const byGrip = {}; const repPts = [];
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    if(ex.type!=='hangboard') return;
    ex.protocols?.forEach(p=>{
      if(p.protocolType==='Max Hang' && p.extraKg!=null){
        byGrip[p.grip]=byGrip[p.grip]||[];
        byGrip[p.grip].push({date:s.date, kg:p.extraKg});
      }
      if(p.protocolType==='Repeaters' && p.extraKg!=null){
        repPts.push({date:s.date, val:p.extraKg, time:p.hangSec});
      }
    });
  })));
  const palette = ['#3da5ff','#34d399','#fbbf24','#f87171','#a78bfa','#fb923c'];
  const grips = Object.keys(byGrip);
  const allDates = Array.from(new Set(grips.flatMap(g=>byGrip[g].map(x=>x.date)))).sort();
  const ds = grips.map((g,i)=>{
    const map = Object.fromEntries(byGrip[g].map(x=>[x.date,x.kg]));
    return {label:g, data: allDates.map(d=>map[d]??null),
      borderColor: palette[i%palette.length], backgroundColor:'transparent', tension:.3, spanGaps:true};
  });
  const ctx = document.getElementById('ch-hbmax');
  if(ctx) _charts['ch-hbmax'] = new Chart(ctx, {type:'line', data:{labels:allDates.map(fmtDateShort), datasets:ds}, options: commonChartOpts()});

  const ctx2 = document.getElementById('ch-hbrep');
  if(ctx2) _charts['ch-hbrep'] = new Chart(ctx2, {type:'line', data:{
    labels: repPts.map(p=>fmtDateShort(p.date)),
    datasets:[
      {label:'Zusatzgewicht (kg)', data: repPts.map(p=>p.val), borderColor:'#3da5ff', tension:.3, backgroundColor:'transparent'},
      {label:'Hängezeit (s)', data: repPts.map(p=>p.time), borderColor:'#34d399', tension:.3, backgroundColor:'transparent', yAxisID:'y2'}
    ]}, options: Object.assign(commonChartOpts(), {scales:{x:{grid:{color:chartColors().border}, ticks:{color:chartColors().muted}}, y:{position:'left', grid:{color:chartColors().border}, ticks:{color:chartColors().muted}}, y2:{position:'right', grid:{display:false}, ticks:{color:chartColors().muted}}}})});
}
function buildEnduranceCharts(sessions){
  destroyChart('ch-runkm'); destroyChart('ch-pace'); destroyChart('ch-bikekm'); destroyChart('ch-bikekmh');
  const weeks = weeksMap(sessions, 12);
  const runWk = {...weeks}, bikeWk = {...weeks};
  const runPace = [], bikeKmh = [];
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00'); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day);
    const k = d.toISOString().slice(0,10);
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      const c = ex.cardio; if(!c) return;
      if(ex.type==='run' && c.distance){
        runWk[k] = (runWk[k]||0) + c.distance;
        const parts = (c.time||'').split(':').map(Number);
        const secs = parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:0;
        if(secs>0 && c.distance>0){
          const pace = (secs/c.distance)/60;
          runPace.push({date:s.date, val:+pace.toFixed(2)});
        }
      }
      if(ex.type==='bike' && c.distance){
        bikeWk[k] = (bikeWk[k]||0) + c.distance;
        const parts = (c.time||'').split(':').map(Number);
        const secs = parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:0;
        if(secs>0 && c.distance>0){
          const kmh = c.distance/(secs/3600);
          bikeKmh.push({date:s.date, val:+kmh.toFixed(1)});
        }
      }
    }));
  });
  const labels = Object.keys(weeks).map(fmtDateShort);
  function lineChart(id, label, data, color){
    const ctx = document.getElementById(id); if(!ctx) return;
    _charts[id] = new Chart(ctx, {type:'bar', data:{labels, datasets:[{label, data:Object.values(data), backgroundColor:color}]}, options:commonChartOpts()});
  }
  lineChart('ch-runkm', 'km', runWk, '#3da5ff');
  lineChart('ch-bikekm', 'km', bikeWk, '#34d399');
  function pointChart(id, label, pts, color){
    const ctx = document.getElementById(id); if(!ctx) return;
    _charts[id] = new Chart(ctx, {type:'line', data:{
      labels: pts.map(p=>fmtDateShort(p.date)),
      datasets:[{label, data: pts.map(p=>p.val), borderColor:color, backgroundColor:'transparent', tension:.25}]}, options: commonChartOpts()});
  }
  pointChart('ch-pace', 'min/km', runPace, '#f87171');
  pointChart('ch-bikekmh', 'km/h', bikeKmh, '#fbbf24');
}
</script>
<script>
/* ============================================================
   Section: LIBRARY (Exercises + Blocks)
============================================================ */
function renderLibrary(){
  return `
  <div class="tabs">
    <button class="${State.libTab==='exercises'?'active':''}" onclick="State.libTab='exercises';render()">Übungen</button>
    <button class="${State.libTab==='blocks'?'active':''}" onclick="State.libTab='blocks';render()">Blöcke</button>
  </div>
  ${State.libTab==='exercises'?renderLibExercises():renderLibBlocks()}`;
}
/* ---- Category helpers (categories double as logging type) ---- */
function allCategories(){ return Store.get('categories', []); }
function catById(id){ return allCategories().find(c=>c.id===id) || null; }
function behaviorLabel(b){ const x = BEHAVIORS.find(z=>z[0]===b); return x?x[1]:b; }
function categoryBehavior(catId){ const c = catById(catId); return c ? c.behavior : 'strength'; }
function resolveCatId(ex){
  if(ex.categoryId && catById(ex.categoryId)) return ex.categoryId;
  return TYPE_TO_CAT[ex.type] || 'cat_strength';
}

function renderLibExercises(){
  const cats = allCategories();
  const ex = Store.get('exercises', []);
  const top = cats.filter(c=>!c.parentId).sort((a,b)=>(a.order||0)-(b.order||0));
  return `
  <div class="row mb">
    <button class="btn primary block" onclick="openEditExercise()">+ Neue Übung</button>
    <button class="btn block" onclick="openEditCategory('','')">+ Kategorie</button>
  </div>
  <div class="muted small mb">Tipp: Übungen per Drag &amp; Drop in eine andere Kategorie ziehen. Köpfe antippen zum Ein-/Ausklappen.</div>
  ${top.length===0 ? `<div class="empty-state">Keine Kategorien.</div>`
    : top.map(c=> renderCategoryNode(c, cats, ex, 0)).join('')}
  `;
}
function renderCategoryNode(cat, cats, ex, depth){
  const collapsed = !!(State.libCollapsed && State.libCollapsed[cat.id]);
  const subs = cats.filter(c=>c.parentId===cat.id).sort((a,b)=>(a.order||0)-(b.order||0));
  const exHere = ex.filter(e=> resolveCatId(e)===cat.id);
  const count = exHere.length + subs.reduce((a,s)=> a + ex.filter(e=>resolveCatId(e)===s.id).length, 0);
  return `<div class="cat-card" style="margin-left:${depth*14}px"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="this.classList.remove('drag-over');dropExerciseOnCat(event,'${cat.id}')">
    <div class="cat-head">
      <button class="cat-toggle" onclick="toggleLibCat('${cat.id}')">${collapsed?'▸':'▾'}</button>
      <span class="cat-title" onclick="toggleLibCat('${cat.id}')">${cat.icon||''} ${escHtml(cat.name)}
        <span class="muted small">· ${count}</span></span>
      <span class="badge" title="Logging-Typ">${escHtml(behaviorLabel(cat.behavior))}</span>
      <div style="display:flex;gap:2px">
        <button class="btn sm icon" title="Unterkategorie" onclick="openEditCategory('','${cat.id}')">＋</button>
        <button class="btn sm icon" title="Bearbeiten" onclick="openEditCategory('${cat.id}','')">✎</button>
        <button class="btn sm icon danger" title="Löschen" onclick="deleteCategory('${cat.id}')">×</button>
      </div>
    </div>
    ${collapsed ? '' : `
      <div class="cat-body">
        ${exHere.length===0 && subs.length===0 ? `<div class="muted small">Leer – Übung hierher ziehen.</div>` : ''}
        ${exHere.map(e=>`<div class="list-item" draggable="true"
            ondragstart="libDragStart(event,'${e.id}')" ondragend="libDragEnd(event)">
          <span class="drag-handle">≡</span>
          <div style="flex:1">
            <div style="font-weight:600">${escHtml(e.name)}</div>
            <div class="muted small">${(e.muscles||[]).join(', ')||'—'}${e.note?' · '+escHtml(e.note):''}</div>
          </div>
          <button class="btn sm icon" onclick="openEditExercise('${e.id}')">✎</button>
          <button class="x-btn" onclick="deleteExercise('${e.id}')">×</button>
        </div>`).join('')}
        ${subs.map(s=> renderCategoryNode(s, cats, ex, depth+1)).join('')}
      </div>`}
  </div>`;
}
function toggleLibCat(id){
  State.libCollapsed = State.libCollapsed || {};
  State.libCollapsed[id] = !State.libCollapsed[id];
  render();
}

/* Drag & drop exercises between categories */
let _libDrag = null;
function libDragStart(e, exId){ _libDrag = exId; e.currentTarget.classList.add('dragging'); }
function libDragEnd(e){ e.currentTarget.classList.remove('dragging'); }
function dropExerciseOnCat(e, catId){
  e.preventDefault(); e.stopPropagation();
  if(!_libDrag) return;
  const list = Store.get('exercises', []);
  const ex = list.find(x=>x.id===_libDrag);
  if(ex){
    ex.categoryId = catId;
    ex.type = categoryBehavior(catId); // category defines the logging type
    Store.set('exercises', list);
  }
  _libDrag = null; render(); toast('Verschoben');
}

/* Category CRUD */
function openEditCategory(id, parentId){
  const cat = id ? catById(id) : {name:'', icon:'', behavior:'strength', parentId: parentId||null};
  if(!cat) return;
  const isSub = !!(cat.parentId);
  openModal(`<div class="sheet">
    <h2>${id?'Kategorie bearbeiten':(parentId?'Neue Unterkategorie':'Neue Kategorie')}<button class="close" onclick="closeModal()">×</button></h2>
    <span class="label">Name</span><input id="ec-n" value="${escHtml(cat.name)}" placeholder="z.B. Pull / Push / Antagonisten">
    <span class="label">Icon (Emoji, optional)</span><input id="ec-ic" value="${escHtml(cat.icon||'')}" placeholder="💪" maxlength="3">
    <span class="label">Logging-Typ (bestimmt die Eingabefelder)</span>
    <select id="ec-b">
      ${BEHAVIORS.map(([v,l])=>`<option value="${v}" ${cat.behavior===v?'selected':''}>${l}</option>`).join('')}
    </select>
    ${isSub?`<div class="muted small mt">Unterkategorie von „${escHtml(catById(cat.parentId)?.name||'')}".</div>`:''}
    <div class="row mt">
      <button class="btn ghost block" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary block" onclick="saveCategory('${id||''}','${cat.parentId||''}')">Speichern</button>
    </div></div>`);
}
function saveCategory(id, parentId){
  const name = document.getElementById('ec-n').value.trim();
  const icon = document.getElementById('ec-ic').value.trim();
  const behavior = document.getElementById('ec-b').value;
  if(!name) return toast('Name fehlt');
  const list = Store.get('categories', []);
  if(id){
    const c = list.find(x=>x.id===id);
    if(c){ c.name=name; c.icon=icon; c.behavior=behavior; }
  } else {
    const maxOrder = Math.max(-1, ...list.filter(c=>(c.parentId||null)===(parentId||null)).map(c=>c.order||0));
    list.push({id:uid('cat'), name, icon, behavior, parentId: parentId||null, order: maxOrder+1});
  }
  Store.set('categories', list); closeModal(); render();
}
function deleteCategory(id){
  const cat = catById(id); if(!cat) return;
  const cats = Store.get('categories', []);
  const top = cats.filter(c=>!c.parentId);
  if(!cat.parentId && top.length<=1) return toast('Mindestens eine Hauptkategorie nötig');
  confirmDialog('Kategorie löschen?','Übungen und Unterkategorien wandern in die übergeordnete Kategorie.', ()=>{
    const fallback = cat.parentId || (top.find(c=>c.id!==id)||{}).id;
    // reattach sub-categories
    cats.forEach(c=>{ if(c.parentId===id) c.parentId = cat.parentId || null; });
    // reassign exercises
    const ex = Store.get('exercises', []);
    ex.forEach(e=>{ if(e.categoryId===id){ e.categoryId = fallback; e.type = categoryBehavior(fallback); } });
    Store.set('exercises', ex);
    Store.set('categories', cats.filter(c=>c.id!==id));
    render(); toast('Kategorie gelöscht');
  }, {danger:true, yesLabel:'Löschen'});
}
function categoryOptionsHtml(selectedId){
  const cats = allCategories();
  const top = cats.filter(c=>!c.parentId).sort((a,b)=>(a.order||0)-(b.order||0));
  let out = '';
  top.forEach(c=>{
    out += `<option value="${c.id}" ${selectedId===c.id?'selected':''}>${escHtml((c.icon?c.icon+' ':'')+c.name)}</option>`;
    cats.filter(s=>s.parentId===c.id).sort((a,b)=>(a.order||0)-(b.order||0)).forEach(s=>{
      out += `<option value="${s.id}" ${selectedId===s.id?'selected':''}>&nbsp;&nbsp;↳ ${escHtml((s.icon?s.icon+' ':'')+s.name)}</option>`;
    });
  });
  return out;
}
function openEditExercise(id){
  const ex = id ? Store.get('exercises',[]).find(e=>e.id===id) : {name:'',type:'strength',muscles:[],note:'',categoryId:'cat_strength'};
  if(!ex) return;
  const curCat = resolveCatId(ex);
  openModal(`<div class="sheet">
    <h2>${id?'Übung bearbeiten':'Neue Übung'}<button class="close" onclick="closeModal()">×</button></h2>
    <span class="label">Name</span><input id="ee-n" value="${escHtml(ex.name)}">
    <span class="label">Kategorie (bestimmt Logging-Typ)</span>
    <select id="ee-cat">
      ${categoryOptionsHtml(curCat)}
    </select>
    <span class="label">Muskelgruppen</span>
    <div class="tag-list" id="ee-m">
      ${MUSCLE_GROUPS.map(m=>{
        const on = (ex.muscles||[]).includes(m);
        return `<span class="chip chip-btn ${on?'on':''}" data-m="${m}" onclick="this.classList.toggle('on')">${m}</span>`;
      }).join('')}
    </div>
    <span class="label">Notiz</span><textarea id="ee-note">${escHtml(ex.note||'')}</textarea>
    <div class="row mt">
      <button class="btn ghost block" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary block" onclick="saveExercise('${id||''}')">Speichern</button>
    </div></div>`);
}
function saveExercise(id){
  const name = document.getElementById('ee-n').value.trim();
  const categoryId = document.getElementById('ee-cat').value;
  const type = categoryBehavior(categoryId); // category defines the logging type
  const muscles = Array.from(document.querySelectorAll('#ee-m .chip.on')).map(c=>c.dataset.m);
  const note = document.getElementById('ee-note').value.trim();
  if(!name) return toast('Name fehlt');
  const list = Store.get('exercises',[]);
  if(id){
    const idx = list.findIndex(e=>e.id===id);
    if(idx>=0) list[idx] = Object.assign(list[idx], {name,type,muscles,note,categoryId});
  } else list.push({id:uid('ex'), name, type, muscles, note, categoryId});
  Store.set('exercises', list); closeModal(); render();
}
function deleteExercise(id){
  confirmDialog('Übung löschen?','Verbleibende Logs bleiben erhalten.',()=>{
    Store.set('exercises', Store.get('exercises',[]).filter(e=>e.id!==id));
    render(); toast('Gelöscht');
  },{danger:true,yesLabel:'Löschen'});
}
function renderLibBlocks(){
  const blocks = Store.get('blocks',[]);
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  return `
  <div class="row mb"><button class="btn primary block" onclick="openEditBlock()">+ Neuer Block</button></div>
  ${blocks.length===0
    ? `<div class="empty-state"><div class="em">📦</div>Lege Blöcke an, um Übungsgruppen mit einem Tap einzufügen.</div>`
    : blocks.map(b=>`<div class="card">
        <div class="card-row">
          <h3>${escHtml(b.name)}</h3>
          <div>
            <button class="btn sm" onclick="openEditBlock('${b.id}')">✎</button>
            <button class="x-btn" onclick="deleteBlock('${b.id}')">×</button>
          </div>
        </div>
        <div class="muted small">Typ: ${escHtml(b.type||'—')}</div>
        <div class="mt">
          ${b.exerciseIds.map(eid=>`<span class="chip">${escHtml(exMap[eid]?.name||'?')}</span>`).join(' ')||'<span class="muted small">Leer</span>'}
        </div>
      </div>`).join('')}
  `;
}
function openEditBlock(id){
  const blk = id ? Store.get('blocks',[]).find(b=>b.id===id) : {name:'',type:'strength',exerciseIds:[]};
  if(!blk) return;
  const exAll = Store.get('exercises',[]);
  openModal(`<div class="sheet">
    <h2>${id?'Block bearbeiten':'Neuer Block'}<button class="close" onclick="closeModal()">×</button></h2>
    <span class="label">Name</span><input id="bk-n" value="${escHtml(blk.name)}">
    <span class="label">Typ</span>
    <select id="bk-t">
      ${[['warmup','Warm-up'],['strength','Kraft'],['climb','Klettern'],['cooldown','Cool-down'],['mobility','Mobility']]
        .map(([v,l])=>`<option value="${v}" ${blk.type===v?'selected':''}>${l}</option>`).join('')}
    </select>
    <span class="label">Übungen</span>
    <div id="bk-ex" style="max-height:40vh;overflow-y:auto">
      ${exAll.map(e=>{
        const on = (blk.exerciseIds||[]).includes(e.id);
        return `<label class="list-item" style="cursor:pointer">
          <input type="checkbox" data-id="${e.id}" ${on?'checked':''} style="width:auto;margin-right:8px">
          <div><div style="font-weight:600">${escHtml(e.name)}</div>
            <div class="muted small">${(e.muscles||[]).join(', ')||e.type}</div></div>
        </label>`;
      }).join('')}
    </div>
    <div class="row mt">
      <button class="btn ghost block" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary block" onclick="saveBlock('${id||''}')">Speichern</button>
    </div></div>`);
}
function saveBlock(id){
  const name = document.getElementById('bk-n').value.trim();
  const type = document.getElementById('bk-t').value;
  const exIds = Array.from(document.querySelectorAll('#bk-ex input:checked')).map(i=>i.dataset.id);
  if(!name) return toast('Name fehlt');
  const list = Store.get('blocks',[]);
  if(id){
    const idx = list.findIndex(b=>b.id===id);
    if(idx>=0) list[idx] = Object.assign(list[idx], {name,type,exerciseIds:exIds});
  } else list.push({id:uid('bk'), name, type, exerciseIds: exIds});
  Store.set('blocks', list); closeModal(); render();
}
function deleteBlock(id){
  confirmDialog('Block löschen?','Verwendete Sessions bleiben unverändert.',()=>{
    Store.set('blocks', Store.get('blocks',[]).filter(b=>b.id!==id));
    render(); toast('Gelöscht');
  },{danger:true,yesLabel:'Löschen'});
}

/* ============================================================
   Section: INJURIES
============================================================ */
const BODY_AREAS = [
  'Finger A1 Pulley','Finger A2 Pulley','Finger A3 Pulley','Finger A4 Pulley',
  'Ringfinger','Mittelfinger','Zeigefinger','Kleiner Finger',
  'Schulter links','Schulter rechts',
  'Ellenbogen Epicondylitis lat. links','Ellenbogen Epicondylitis lat. rechts',
  'Ellenbogen Epicondylitis med. links','Ellenbogen Epicondylitis med. rechts',
  'Handgelenk links','Handgelenk rechts',
  'Knie links','Knie rechts','Rücken LWS','Rücken BWS','Sonstiges'
];
function renderInjuries(){
  const all = Store.get('injuries',[]);
  const list = State.injuryView==='active' ? all.filter(i=>i.status==='aktiv') : all;
  return `
  <div class="row mb">
    <div class="tabs" style="margin:0;flex:1">
      <button class="${State.injuryView==='active'?'active':''}" onclick="State.injuryView='active';render()">Aktiv</button>
      <button class="${State.injuryView==='all'?'active':''}" onclick="State.injuryView='all';render()">Alle</button>
    </div>
    <button class="btn primary" onclick="openEditInjury()">+ Neu</button>
  </div>
  ${list.length===0
    ? `<div class="empty-state"><div class="em">💪</div>Keine ${State.injuryView==='active'?'aktiven':''} Verletzungen. Bleib gesund!</div>`
    : list.map(i=>`<div class="card">
        <div class="card-row">
          <div>
            <h3>${escHtml(i.diagnosis||i.area)} ${i.status==='aktiv'?`<span class="badge danger">Aktiv</span>`:`<span class="badge success">Abgeklungen</span>`}</h3>
            <div class="muted small">${escHtml(i.area)} · Schwere ${i.severity}/5</div>
          </div>
          <div>
            <button class="btn sm" onclick="openEditInjury('${i.id}')">✎</button>
            <button class="x-btn" onclick="deleteInjury('${i.id}')">×</button>
          </div>
        </div>
        <div class="muted small mt">${fmtDate(i.start)}${i.end?' – '+fmtDate(i.end):' – läuft'}</div>
        ${i.treatment?`<div class="mt small">🩺 ${escHtml(i.treatment)}</div>`:''}
        ${i.pauseDays?`<div class="muted small">Trainingspause: ${i.pauseDays} Tage</div>`:''}
      </div>`).join('')}
  `;
}
function openEditInjury(id){
  const inj = id ? Store.get('injuries',[]).find(x=>x.id===id) : {
    start: todayISO(), end: '', area:'', diagnosis:'', severity:1, status:'aktiv',
    treatment:'', pauseDays:0, bodyPart:''
  };
  if(!inj) return;
  openModal(`<div class="sheet">
    <h2>${id?'Verletzung bearbeiten':'Neuer Eintrag'}<button class="close" onclick="closeModal()">×</button></h2>
    <div class="row tight">
      <div><span class="label">Beginn</span><input type="date" id="iv-s" value="${inj.start||''}"></div>
      <div><span class="label">Ende (optional)</span><input type="date" id="iv-e" value="${inj.end||''}"></div>
    </div>
    <div class="body-tabs">
      <button class="btn sm" id="iv-tab-front" onclick="bodyTab('front')">Vorne</button>
      <button class="btn sm" id="iv-tab-back" onclick="bodyTab('back')">Hinten</button>
    </div>
    <div id="body-svg-wrap"></div>
    <span class="label">Bereich</span>
    <select id="iv-a">${BODY_AREAS.map(a=>`<option ${inj.area===a?'selected':''}>${a}</option>`).join('')}</select>
    <input id="iv-aother" placeholder="Ergänzung / Freitext" value="${escHtml(inj.areaNote||'')}" style="margin-top:6px">
    <span class="label">Diagnose</span>
    <input id="iv-d" value="${escHtml(inj.diagnosis||'')}" placeholder="z.B. A2 Pulley Strain Grad 2">
    <span class="label">Schweregrad: <span id="iv-sv-l">${inj.severity||1}</span>/5</span>
    <input type="range" id="iv-sv" min="1" max="5" value="${inj.severity||1}" oninput="document.getElementById('iv-sv-l').textContent=this.value">
    <span class="label">Status</span>
    <select id="iv-st">
      <option value="aktiv" ${inj.status==='aktiv'?'selected':''}>Aktiv</option>
      <option value="abgeklungen" ${inj.status==='abgeklungen'?'selected':''}>Abgeklungen</option>
    </select>
    <span class="label">Behandlung / Maßnahmen</span>
    <textarea id="iv-tr">${escHtml(inj.treatment||'')}</textarea>
    <span class="label">Trainingspause (Tage)</span>
    <input type="number" inputmode="numeric" id="iv-pd" value="${inj.pauseDays||0}">
    <div class="row mt">
      <button class="btn ghost block" onclick="closeModal()">Abbrechen</button>
      <button class="btn primary block" onclick="saveInjury('${id||''}')">Speichern</button>
    </div></div>`);
  bodyTab('front', inj.bodyPart);
}
function bodyTab(side, sel){
  document.getElementById('body-svg-wrap').innerHTML = renderBodySvg(side, sel||window._bodyPart);
  document.getElementById('iv-tab-front').classList.toggle('primary', side==='front');
  document.getElementById('iv-tab-back').classList.toggle('primary', side==='back');
}
function humanFigureSvg(side){
  // A clean, clearly-human silhouette (head, neck, torso, two arms, two legs)
  return `

function pickBody(id, label){
  window._bodyPart = id;
  document.querySelectorAll('.body-svg circle').forEach(c=>c.classList.toggle('selected', c.dataset.id===id));

}
function saveInjury(id){
  const obj = {
    id: id||uid('inj'),
    start: document.getElementById('iv-s').value,
    end: document.getElementById('iv-e').value || null,
    area: document.getElementById('iv-a').value,
    areaNote: document.getElementById('iv-aother').value,
    bodyPart: window._bodyPart||'',
    diagnosis: document.getElementById('iv-d').value,
    severity: +document.getElementById('iv-sv').value,
    status: document.getElementById('iv-st').value,
    treatment: document.getElementById('iv-tr').value,
    pauseDays: +document.getElementById('iv-pd').value||0
  };
  if(!obj.start) return toast('Datum fehlt');
  const list = Store.get('injuries',[]);
  const idx = id ? list.findIndex(x=>x.id===id) : -1;
  if(idx>=0) list[idx] = obj; else list.push(obj);
  Store.set('injuries', list); closeModal(); render();
}

function importData(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const obj = JSON.parse(r.result);
      confirmDialog('Daten importieren?','Bestehende Daten werden überschrieben.',()=>{
        Store.importAll(obj); applyTheme(); render(); toast('Import erfolgreich');
      },{});
    }catch(e){ toast('Datei ungültig: '+e.message); }
  };
  r.readAsText(f);
  input.value = '';

/* ============================================================
   PWA: Service Worker + Manifest as Blob URLs
============================================================ */
function setupPWA(){
  // Manifest
  const manifest = {
    name:'PeakTrack – Training & Bouldern', short_name:'PeakTrack',
    description:'Trainings-Tracker für Bouldern, Klettern, Kraft, Lauf & Rad.',
    display:'standalone', orientation:'portrait',
    start_url:'.', scope:'.',
    theme_color:'#0b1220', background_color:'#0b1220',
    icons:[{
      src:'data:image/svg+xml;utf8,'+encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
          <rect width="192" height="192" rx="32" fill="#0b1220"/>
          <path d="M40 140 L80 80 L100 110 L130 60 L160 140 Z" fill="#3da5ff"/>
          <circle cx="130" cy="55" r="10" fill="#fbbf24"/>
        </svg>`),
      sizes:'192x192', type:'image/svg+xml', purpose:'any'
    }]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const mUrl = URL.createObjectURL(mBlob);
  const link = document.createElement('link');
  link.rel='manifest'; link.href = mUrl; document.head.appendChild(link);

  // Service worker (best-effort; blob SW is unsupported in many browsers,
  // so we try a same-origin SW only when served from http(s))
  if('serviceWorker' in navigator && /^https?:/.test(location.protocol)){
    const swCode = `
      const CACHE='peaktrack-v3';
      self.addEventListener('install', e=> self.skipWaiting());
      self.addEventListener('activate', e=> e.waitUntil((async()=>{
        // remove old caches so updates take effect
        const keys = await caches.keys();
        await Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)));
        await self.clients.claim();
      })()));
      self.addEventListener('fetch', e=>{
        if(e.request.method!=='GET') return;
        // network-first: always load the latest when online, fall back to cache offline
        e.respondWith((async()=>{
          try{
            const res = await fetch(e.request);
            const c = await caches.open(CACHE);
            try{ c.put(e.request, res.clone()); }catch(_){}
            return res;
          }catch(_){
            const c = await caches.open(CACHE);
            return (await c.match(e.request)) || (await c.match('./')) || (await c.match('/')) || Response.error();
          }
        })());
      });
    `;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).then(reg=>{ try{ reg.update(); }catch(_){} }).catch(()=>{ /* ignore */ });
  }
}

============================================================ */
(async function boot(){
  // Cloud-Daten laden — mit 5-Sekunden-Timeout damit die App nicht hängt
  if(SCRIPT_URL){
    const ind = document.getElementById('sync-indicator');
    if(ind){ ind.textContent='☁ Lade…'; ind.style.color='var(--text-muted)'; }
    try {
      const timeout = new Promise(res => setTimeout(res, 5000));
      await Promise.race([Store.loadFromCloud(), timeout]);
    } catch(e){ console.warn('Cloud-Laden übersprungen:', e); }
    const ind2 = document.getElementById('sync-indicator');
    if(ind2){ ind2.textContent=''; }
  }
  // App starten — immer, auch wenn Cloud-Laden fehlschlug
  try {
    initData(); applyTheme(); render(); setupPWA();
    startDraftAutosave();
    maybeRecoverDraft();
  }
  catch(e){ console.error('App-Start-Fehler:', e); }
})();
window.addEventListener('beforeunload', e=>{
  if(State.currentSession){ e.preventDefault(); e.returnValue=''; }
});
