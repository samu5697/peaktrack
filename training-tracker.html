<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PeakTrack – Training & Bouldern</title>
<style>
:root{
  --bg:#0b1220;--bg-2:#111a2e;--bg-3:#1a2540;--card:#152033;--card-2:#1c2942;
  --text:#e8edf7;--text-muted:#8a98b3;--text-dim:#5b6a86;
  --border:#243352;--border-2:#2e405f;
  --accent:#3da5ff;--accent-2:#1f7fd6;--accent-soft:#1b3a5c;
  --success:#34d399;--warning:#fbbf24;--orange:#fb923c;--danger:#f87171;
  --purple:#a78bfa;--pink:#f472b6;
  --shadow:0 6px 24px rgba(0,0,0,.35);
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --tap:44px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
[data-theme="light"]{
  --bg:#f5f7fb;--bg-2:#eef2f8;--bg-3:#e3e9f3;--card:#ffffff;--card-2:#f7f9fc;
  --text:#0f172a;--text-muted:#475569;--text-dim:#94a3b8;
  --border:#dbe2ee;--border-2:#c8d2e2;
  --accent:#1f7fd6;--accent-2:#155da0;--accent-soft:#dbeafe;
  --shadow:0 4px 18px rgba(15,23,42,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,sans-serif;
  font-size:15px;line-height:1.45;overscroll-behavior-y:none}
body{min-height:100vh;min-height:100dvh}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{
  background:var(--bg-2);border:1px solid var(--border);color:var(--text);
  padding:10px 12px;border-radius:var(--radius-sm);outline:none;width:100%;
  transition:border-color .15s,background .15s
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
h1,h2,h3,h4{margin:0 0 8px;font-weight:700;letter-spacing:-.01em}
h1{font-size:1.4rem}h2{font-size:1.15rem}h3{font-size:1rem}h4{font-size:.9rem}
a{color:var(--accent);text-decoration:none}

/* Layout */
#app{display:flex;min-height:100vh;min-height:100dvh}
.sidebar{display:none;flex-direction:column;width:240px;background:var(--bg-2);
  border-right:1px solid var(--border);padding:24px 14px;position:sticky;top:0;height:100dvh}
.sidebar .logo{display:flex;align-items:center;gap:10px;font-weight:800;
  font-size:1.1rem;padding:0 8px 16px;color:var(--text)}
.sidebar .logo .dot{width:14px;height:14px;border-radius:4px;background:var(--accent)}
.sidebar nav{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.sidebar nav button{display:flex;align-items:center;gap:12px;padding:11px 12px;
  border-radius:var(--radius-sm);color:var(--text-muted);font-weight:500;text-align:left}
.sidebar nav button.active{background:var(--accent-soft);color:var(--accent)}
.sidebar nav button:hover{background:var(--bg-3);color:var(--text)}
.sidebar nav button .ico{width:22px;text-align:center}

main{flex:1;display:flex;flex-direction:column;min-width:0;
  padding-bottom:calc(72px + var(--safe-bottom))}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px calc(14px + var(--safe-top));position:sticky;top:0;background:var(--bg);
  z-index:10;border-bottom:1px solid var(--border)}
.topbar h1{margin:0;font-size:1.1rem}
.topbar .tools{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:10px;display:inline-flex;
  align-items:center;justify-content:center;background:var(--bg-2);border:1px solid var(--border)}
.icon-btn:hover{background:var(--bg-3)}
.view{padding:14px 16px 30px;max-width:1100px;width:100%;margin:0 auto}

/* Bottom nav (mobile) */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:flex;
  background:var(--bg-2);border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);z-index:50}
.bottom-nav button{flex:1;min-height:60px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;color:var(--text-muted);
  font-size:.7rem;font-weight:500}
.bottom-nav button.active{color:var(--accent)}
.bottom-nav button .ico{font-size:1.2rem;line-height:1}

@media(min-width:900px){
  .sidebar{display:flex}
  .bottom-nav{display:none}
  main{padding-bottom:30px}
  .view{padding:24px 28px 40px}
  .topbar{padding-left:28px;padding-right:28px}
}

/* Cards & components */
.card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card.elev{box-shadow:var(--shadow)}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--text-muted)}.dim{color:var(--text-dim)}.small{font-size:.85rem}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1;min-width:0}
.row.tight{gap:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.grid-4{grid-template-columns:repeat(2,1fr)}}
.label{display:block;font-size:.78rem;color:var(--text-muted);margin:0 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 16px;background:var(--bg-3);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-weight:600;
  min-height:var(--tap);transition:transform .1s,background .15s}
.btn:hover{background:var(--card-2)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-2)}
.btn.ghost{background:transparent}
.btn.danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn.success{background:var(--success);color:#04211a;border-color:var(--success)}
.btn.block{width:100%}
.btn.sm{padding:7px 11px;font-size:.85rem;min-height:36px}
.btn.icon{padding:9px;min-width:38px;min-height:38px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;
  background:var(--bg-3);border:1px solid var(--border);border-radius:999px;
  font-size:.78rem;color:var(--text-muted);font-weight:600}
.chip.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.chip-btn{cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.7rem;font-weight:700;
  background:var(--accent-soft);color:var(--accent)}
.badge.warn{background:rgba(251,191,36,.15);color:var(--warning)}
.badge.danger{background:rgba(248,113,113,.15);color:var(--danger)}
.badge.success{background:rgba(52,211,153,.15);color:var(--success)}

/* Stars rating */
.stars{display:inline-flex;gap:4px}
.stars button{font-size:1.3rem;color:var(--text-dim);padding:2px}
.stars button.on{color:var(--warning)}

/* Slider */
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-val{min-width:36px;text-align:center;font-weight:700;color:var(--accent)}

/* Modal/Sheet */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;animation:fade .15s}
@keyframes fade{from{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}}
.sheet{background:var(--card);width:100%;max-width:560px;
  max-height:92dvh;overflow-y:auto;border-radius:20px 20px 0 0;
  padding:18px 16px calc(20px + var(--safe-bottom));animation:slideUp .25s}
@media(min-width:900px){
  .modal-bg{align-items:center}
  .sheet{border-radius:20px;max-height:85vh}
}
.sheet h2{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sheet h2 .close{font-size:1.6rem;color:var(--text-muted);padding:4px 10px}

/* Toast */
.toast{position:fixed;left:50%;bottom:calc(80px + var(--safe-bottom));transform:translateX(-50%);
  background:var(--card-2);color:var(--text);padding:10px 16px;border-radius:999px;
  border:1px solid var(--border);box-shadow:var(--shadow);z-index:200;
  display:flex;align-items:center;gap:10px;animation:slideUp .2s}
.toast button{color:var(--accent);font-weight:700}

/* Calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-grid .dow{font-size:.7rem;color:var(--text-muted);text-align:center;font-weight:700;padding:4px 0}
.cal-day{aspect-ratio:1;background:var(--bg-2);border:1px solid var(--border);
  border-radius:8px;padding:4px;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;font-size:.8rem;cursor:pointer;position:relative}
.cal-day.other{opacity:.35}
.cal-day.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.cal-day.deload{background:rgba(61,165,255,.12)}
.cal-day .num{font-weight:700;font-size:.85rem}
.cal-day .icons{display:flex;gap:1px;font-size:.65rem;flex-wrap:wrap;justify-content:center;line-height:1}
.cal-day .dot{width:6px;height:6px;border-radius:50%;margin-top:auto}

/* Boulder pyramid */
.pyramid-row{display:flex;align-items:center;gap:8px;margin:3px 0}
.pyramid-row .grade{width:42px;font-weight:700;font-size:.85rem}
.pyramid-row .bar{flex:1;height:24px;background:var(--bg-2);border-radius:6px;display:flex;overflow:hidden}
.pyramid-row .seg{height:100%;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;color:#000}
.seg.flash{background:var(--warning)}
.seg.send{background:var(--success);color:#04211a}
.seg.top{background:var(--accent)}
.seg.attempt{background:var(--text-dim)}

/* Body diagram */
.body-svg{width:100%;max-width:240px;display:block;margin:0 auto}
.body-svg .fig{fill:var(--bg-3);stroke:var(--border-2);stroke-width:1.6;stroke-linejoin:round;pointer-events:none}
.body-svg .fig-line{fill:none;stroke:var(--border-2);stroke-width:1.2;pointer-events:none;opacity:.7}
.body-svg circle.hot{fill:var(--accent);stroke:var(--bg);stroke-width:1;cursor:pointer;opacity:.4;transition:opacity .15s,fill .15s}
.body-svg circle.hot:hover{opacity:.85}
.body-svg circle.selected{fill:var(--danger)!important;opacity:1}
.body-tabs{display:flex;justify-content:center;gap:6px;margin:8px 0}

/* Rest timer */
.timer-circle{position:relative;width:160px;height:160px;margin:0 auto}
.timer-circle svg{transform:rotate(-90deg)}
.timer-circle .timer-text{position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;font-size:2rem;font-weight:800}

/* PR Celebration */
@keyframes pop{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.pr-celebrate{animation:pop .5s ease}

/* Drag handle */
.drag-handle{cursor:grab;color:var(--text-dim);padding:4px 8px;user-select:none}
.dragging{opacity:.4}
.drag-over{border-top:2px solid var(--accent)!important}

/* Utility */
.center{text-align:center}.mt{margin-top:14px}.mb{margin-bottom:14px}
.flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px}
.gap{gap:10px}
.empty-state{text-align:center;padding:36px 20px;color:var(--text-muted)}
.empty-state .em{font-size:2.4rem;margin-bottom:6px}
.tag-list{display:flex;flex-wrap:wrap;gap:6px}
.list-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-2);
  border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.list-item:last-child{margin-bottom:0}
.x-btn{padding:4px 10px;color:var(--danger);font-weight:700}
.habit-line{display:flex;align-items:center;gap:10px;justify-content:space-between;margin:6px 0}
.habit-line .chip{flex:1}
.done-btn{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-2);
  background:var(--bg-2);color:var(--success);font-weight:800;font-size:.8rem;
  display:inline-flex;align-items:center;justify-content:center;flex:none}
.done-btn.on{background:var(--success);border-color:var(--success);color:#04211a}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;margin-bottom:8px}
.cat-card.drag-over{border-color:var(--accent);box-shadow:inset 0 0 0 2px var(--accent)}
.cat-head{display:flex;align-items:center;gap:8px}
.cat-head .cat-toggle{padding:2px 6px;color:var(--text-muted);font-weight:700}
.cat-head .cat-title{flex:1;font-weight:700;cursor:pointer;min-width:0}
.cat-body{padding:6px 0 2px 6px}

/* Set row in active session */
.set-row{display:grid;grid-template-columns:30px 1fr 1fr auto;gap:6px;align-items:center;padding:6px 0}
.set-row.boulder{grid-template-columns:30px 1fr 1fr auto}
.set-row.hangboard{grid-template-columns:30px 1fr 1fr auto}

/* Responsive tabs */
.tabs{display:flex;gap:4px;background:var(--bg-2);padding:4px;border-radius:10px;margin-bottom:14px;overflow-x:auto}
.tabs button{flex:1;min-width:max-content;padding:8px 12px;border-radius:7px;color:var(--text-muted);font-weight:600;font-size:.85rem;white-space:nowrap}
.tabs button.active{background:var(--card);color:var(--text)}

/* Stat tile */
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;display:flex;flex-direction:column;gap:2px}
.stat-tile .v{font-size:1.4rem;font-weight:800;color:var(--accent)}
.stat-tile .l{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}

/* Switch */
.switch{position:relative;display:inline-block;width:46px;height:26px}
.switch input{opacity:0;width:0;height:0}
.switch span{position:absolute;inset:0;background:var(--bg-3);border-radius:999px;
  border:1px solid var(--border);transition:.2s}
.switch span:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:2px;
  background:var(--text);border-radius:50%;transition:.2s}
.switch input:checked + span{background:var(--accent);border-color:var(--accent)}
.switch input:checked + span:before{transform:translateX(20px);background:#fff}

/* Banner */
.banner{padding:12px 14px;border-radius:var(--radius-sm);
  background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.4);
  color:var(--warning);margin-bottom:12px;font-size:.9rem}
.banner.info{background:rgba(61,165,255,.12);border-color:rgba(61,165,255,.4);color:var(--accent)}

/* Confirm */
.confirm-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

/* Hidden */
.hidden{display:none!important}

/* Scroll touch fix */
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* Chart container */
.chart-box{background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:12px}
.chart-box h3{margin-bottom:8px}
.chart-canvas-wrap{position:relative;height:240px}

/* Quick exercise tile */
.qx{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px;text-align:left;display:flex;flex-direction:column;gap:2px}
.qx:hover{background:var(--bg-3)}
.qx .name{font-weight:700;font-size:.9rem}
.qx .meta{font-size:.7rem;color:var(--text-muted)}

/* Plan day */
.plan-day{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.plan-day h3{display:flex;justify-content:space-between;align-items:center;font-size:1rem;margin-bottom:8px}
.plan-day .item{display:flex;align-items:center;gap:8px;background:var(--bg-2);
  border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px}
.plan-day .item:last-child{margin-bottom:0}
.plan-day .item .name{flex:1}

/* Active session sticky bar */
.session-bar{position:sticky;top:0;z-index:5;background:var(--card);
  border-bottom:1px solid var(--border);padding:10px 14px;display:flex;
  justify-content:space-between;align-items:center;margin:-14px -16px 14px}
@media(min-width:900px){.session-bar{margin:-24px -28px 18px}}

</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="logo"><span class="dot"></span> PeakTrack</div>
    <nav id="sidebar-nav"></nav>
  </aside>
  <main>
    <div class="topbar">
      <h1 id="topbar-title">Dashboard</h1>
      <div class="tools">
        <span id="sync-indicator" style="font-size:.75rem;font-weight:600;padding:0 6px;color:var(--text-muted)"></span>
        <button class="icon-btn" id="theme-toggle" title="Theme wechseln">🌓</button>
      </div>
    </div>
    <div class="view" id="view"></div>
  </main>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>window._chartReady=false;</script>
<script>
/* ============================================================
   PeakTrack — Bouldering & Training Tracker
   Single-file vanilla JS app. All UI strings: German.
   Code comments: English.
============================================================ */

/* -------- 1. Storage layer ---------- */

// ↓ Deine Apps Script Web-App URL hier eintragen (nach dem Deployen):
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySzkzE0iR3dYZ1JpL45znd-UYT_q5ATbV9AP_qycwL9_kgJgp-Emy5y4WrzO7VDI66/exec';

const KEYS = ['sessions','weekPlan','blocks','exercises','bodyweight',
              'injuries','settings','sleep','nutrition','halls','recentExercises',
              'sessionDraft','dailyHabits','categories','weeklyGoals'];

let _syncTimer = null;
let _syncStatus = 'idle'; // 'idle' | 'syncing' | 'ok' | 'error'

const Store = {
  get(k, d){ try{ const v = localStorage.getItem('pt_'+k);
    return v===null ? d : JSON.parse(v); } catch(e){ return d; } },
  set(k,v){
    localStorage.setItem('pt_'+k, JSON.stringify(v));
    Store._scheduleSync();
  },
  _scheduleSync(){
    if(!SCRIPT_URL) return;
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(Store._doSync, 1500);
  },
  async _doSync(){
    if(!SCRIPT_URL) return;
    _syncStatus = 'syncing';
    Store._updateSyncUI();
    try {
      const payload = JSON.stringify(Store.exportAll());
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: payload,
        headers: { 'Content-Type': 'text/plain' }
      });
      _syncStatus = 'ok';
    } catch(e) {
      _syncStatus = 'error';
      console.warn('Cloud-Sync fehlgeschlagen:', e);
    }
    Store._updateSyncUI();
    setTimeout(()=>{ _syncStatus = 'idle'; Store._updateSyncUI(); }, 3000);
  },
  async loadFromCloud(){
    if(!SCRIPT_URL) return false;
    try {
      const r = await fetch(SCRIPT_URL + '?t=' + Date.now());
      if(!r.ok) return false;
      const data = await r.json();
      if(data && typeof data === 'object' && data.__meta){
        // Import without triggering sync (avoids echo loop)
        KEYS.forEach(k=>{ if(k in data && data[k]!==null)
          localStorage.setItem('pt_'+k, JSON.stringify(data[k])); });
        return true;
      }
    } catch(e) {
      console.warn('Cloud-Laden fehlgeschlagen:', e);
    }
    return false;
  },
  _updateSyncUI(){
    const el = document.getElementById('sync-indicator');
    if(!el) return;
    if(_syncStatus==='syncing'){ el.textContent='☁ Sync…'; el.style.color='var(--text-muted)'; }
    else if(_syncStatus==='ok'){  el.textContent='☁ ✓';    el.style.color='var(--success)'; }
    else if(_syncStatus==='error'){el.textContent='☁ ✗';   el.style.color='var(--danger)'; }
    else { el.textContent=''; }
  },
  exportAll(){
    const out = {};
    KEYS.forEach(k=> out[k] = Store.get(k, null));
    out.__meta = { app:'PeakTrack', exported: new Date().toISOString(), version:1 };
    return out;
  },
  importAll(obj){
    if(!obj || typeof obj !== 'object') throw new Error('Ungültiges Format');
    KEYS.forEach(k=>{ if(k in obj && obj[k]!==null) Store.set(k, obj[k]); });
  },
  clearAll(){ KEYS.forEach(k=> localStorage.removeItem('pt_'+k)); }
};

/* -------- 2. Default seed data ------- */
const SEED_EXERCISES = [
  {id:'ex_pullup', name:'Klimmzüge', type:'strength', muscles:['Rücken','Bizeps'], note:'Voller Hang, breiter Griff'},
  {id:'ex_wpullup', name:'Klimmzüge gewichtet', type:'strength', muscles:['Rücken','Bizeps']},
  {id:'ex_muscleup', name:'Muscle-up', type:'strength', muscles:['Rücken','Brust','Trizeps']},
  {id:'ex_dip', name:'Dips', type:'strength', muscles:['Brust','Trizeps','Schulter']},
  {id:'ex_pushup', name:'Liegestütze', type:'strength', muscles:['Brust','Trizeps','Schulter']},

  const _cats = Store.get('categories', []);
  const _catIds = new Set(_cats.map(c=>c.id));
  const _exs = Store.get('exercises', []);
  let _exChanged = false;
  _exs.forEach(e=>{
    if(!e.categoryId || !_catIds.has(e.categoryId)){
      e.categoryId = TYPE_TO_CAT[e.type] || 'cat_strength';
      _exChanged = true;
    }
  });
  if(_exChanged) Store.set('exercises', _exs);
  // sessionDraft stays null until an active session writes one
  if(Store.get('weekPlan',null)===null){
    const wp = {}; ['monday','tuesday','wednesday','thursday','friday','saturday','sunday']
      .forEach(d=> wp[d]={ name:'', items:[], rest:false, activeRest:false });
    Store.set('weekPlan', wp);
  }
  const s = Store.get('settings', null);
  if(!s) Store.set('settings', DEFAULT_SETTINGS);
  else Store.set('settings', Object.assign({}, DEFAULT_SETTINGS, s,
       { meso: Object.assign({}, DEFAULT_SETTINGS.meso, s.meso||{}),
         goals: Object.assign({}, DEFAULT_SETTINGS.goals, s.goals||{}),
         units: Object.assign({}, DEFAULT_SETTINGS.units, s.units||{}) }));

/* Daily habits ------------------------------------------------ */
function getHabits(iso){
  const all = Store.get('dailyHabits', {});
  const h = all[iso] || {};
  return { sonnengruss: !!h.sonnengruss, hangboard: h.hangboard||0, beweglichkeit: !!h.beweglichkeit };
}
function habitComplete(h){ return !!h.sonnengruss && !!h.beweglichkeit && (h.hangboard||0) >= 1; }
function saveHabits(iso, h){
  const all = Store.get('dailyHabits', {});
  all[iso] = h; Store.set('dailyHabits', all);
}
function toggleHabit(field){
  const iso = todayISO();
  const h = getHabits(iso); h[field] = !h[field]; saveHabits(iso, h); render();
}
function cycleHangboard(){
  // 0 → 1× → 2× → 0
  const iso = todayISO();
  const h = getHabits(iso); h.hangboard = ((h.hangboard||0) + 1) % 3; saveHabits(iso, h); render();
}

/* Backfill habits for past days to keep streaks alive */
function openHabitBackfill(){ renderHabitBackfill(); }
function fmtBackfillDay(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('de-DE',{weekday:'long', day:'2-digit', month:'2-digit'});
}
function renderHabitBackfill(){
  const days = [];
  for(let i=0;i<14;i++){ const d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().slice(0,10)); }
  openModal(`<div class="sheet">
    <h2>Routinen nachtragen<button class="close" onclick="closeModal();render()">×</button></h2>
    <div class="muted small mb">Vergessene Tage nachträglich abhaken, um deine Streaks zu erhalten.</div>
    ${days.map(iso=>{
      const h = getHabits(iso);
      const hb = h.hangboard===2 ? '2×' : h.hangboard===1 ? '1×' : 'Aus';
      const isToday = iso===todayISO();
      return `<div class="card" style="background:var(--bg-2);padding:10px;margin-bottom:8px">
        <div class="small mb" style="font-weight:700">${isToday?'Heute':escHtml(fmtBackfillDay(iso))}</div>
        <div class="tag-list">
          <span class="chip chip-btn ${h.sonnengruss?'on':''}" onclick="backfillToggle('${iso}','sonnengruss',this)">☀️ Sonnengruß</span>
          <span class="chip chip-btn ${h.beweglichkeit?'on':''}" onclick="backfillToggle('${iso}','beweglichkeit',this)">🤸 Beweglichkeit</span>
          <span class="chip chip-btn ${h.hangboard>0?'on':''}" onclick="backfillCycleHb('${iso}',this)">✊ Hangboard: ${hb}</span>
        </div>
      </div>`;
    }).join('')}
    <div class="row mt"><button class="btn primary block" onclick="closeModal();render()">Fertig</button></div>
  </div>`);
}
function backfillToggle(iso, field, el){
  // Update in place so the modal doesn't rebuild and jump the scroll position
  const h = getHabits(iso); h[field] = !h[field]; saveHabits(iso, h);
  if(el) el.classList.toggle('on', !!h[field]);
}
function backfillCycleHb(iso, el){
  const h = getHabits(iso); h.hangboard = ((h.hangboard||0) + 1) % 3; saveHabits(iso, h);
  if(el){
    const hb = h.hangboard===2 ? '2×' : h.hangboard===1 ? '1×' : 'Aus';
    el.textContent = '✊ Hangboard: ' + hb;
    el.classList.toggle('on', h.hangboard>0);
  }
}
function computeHabitStreak(field){
  // Separate streak per habit (field: 'sonnengruss' | 'beweglichkeit' | 'hangboard')
  const all = Store.get('dailyHabits', {});
  const ok = h => field==='hangboard' ? (h.hangboard||0) >= 1 : !!h[field];
  let streak = 0, i = 0;
  while(true){
    const dd = new Date(); dd.setDate(dd.getDate()-i);
    const iso = dd.toISOString().slice(0,10);
    const h = all[iso];
    if(h && ok(h)){ streak++; i++; continue; }
    if(i===0){ i++; continue; } // today may still be in progress
    break;
  }
  return streak;
}

function computeStreak(sessions){
  if(!sessions.length) return 0;
  const dates = new Set(sessions.map(s=>s.date));
  let streak = 0; const d = new Date();
  // count back day-by-day; allow today not yet trained but yesterday counts
  let i = 0;
  while(true){
    const dd = new Date(); dd.setDate(d.getDate()-i);
    const iso = dd.toISOString().slice(0,10);
    if(dates.has(iso)){ streak++; i++; continue; }
    if(i===0){ i++; continue; } // skip today if not yet trained
    break;
  }
  return streak;
}
/* Custom weekly goals -----------------------------------------
   Stored per ISO week (Monday). A new week is seeded from the most
   recent previous week's goals (text carried over, unchecked), and
   stays freely editable. */
function weekKeyOf(iso){
  const d = new Date(iso+'T00:00:00');
  const day = (d.getDay()+6)%7; // Mon = 0
  const m = new Date(d); m.setDate(d.getDate()-day);
  return m.toISOString().slice(0,10);
}
function getWeeklyGoals(){
  const wk = weekKeyOf(todayISO());
  const all = Store.get('weeklyGoals', {});
  if(!all[wk]){
    const prevKeys = Object.keys(all).filter(k=>k<wk).sort();
    const prev = prevKeys.length ? all[prevKeys[prevKeys.length-1]] : [];
    all[wk] = (prev||[]).map(g=>({id:uid('wg'), text:g.text, done:false}));
    Store.set('weeklyGoals', all);
  }
  return all[wk];
}
function setWeeklyGoals(arr){
  const wk = weekKeyOf(todayISO());
  const all = Store.get('weeklyGoals', {}); all[wk] = arr; Store.set('weeklyGoals', all);
}
function addWeeklyGoal(){
  const inp = document.getElementById('wg-new');
  const t = (inp ? inp.value : '').trim();
  if(!t) return;
  const g = getWeeklyGoals(); g.push({id:uid('wg'), text:t, done:false}); setWeeklyGoals(g); render();
}
function toggleWeeklyGoal(id){
  const g = getWeeklyGoals(); const x = g.find(z=>z.id===id); if(x) x.done = !x.done; setWeeklyGoals(g); render();
}
function rmWeeklyGoal(id){
  setWeeklyGoals(getWeeklyGoals().filter(z=>z.id!==id)); render();
}
function computeWeeklyGoals(sessions, settings){
  const now = new Date();
  const day = (now.getDay()+6)%7; // 0 = Mon
  const monday = new Date(now); monday.setDate(now.getDate()-day);
  const mIso = monday.toISOString().slice(0,10);
  const inWeek = sessions.filter(s=> s.date >= mIso);
  let gradeSends = 0;
  inWeek.forEach(s=>{
    s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      ex.problems?.forEach(p=>{
        if((p.result==='Send'||p.result==='Flash') && p.grade===settings.goals.targetGrade) gradeSends++;
      });
    }));
  });
  return { done: inWeek.length, target: settings.goals.sessionsPerWeek, gradeSends };
}
function needsDeload(sessions){
  // 3+ consecutive weeks with avg post-RPE >=7 OR high volume
  if(sessions.length<6) return false;
  const byWeek = {};
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00');
    const day = (d.getDay()+6)%7; const m = new Date(d); m.setDate(d.getDate()-day);
    const k = m.toISOString().slice(0,10);
    byWeek[k] = byWeek[k] || {rpes:[], count:0};
    if(typeof s.rpePostPhys === 'number') byWeek[k].rpes.push(s.rpePostPhys);
    byWeek[k].count++;
  });
  const weeks = Object.keys(byWeek).sort().slice(-3);
  if(weeks.length<3) return false;
  return weeks.every(k=>{
    const w = byWeek[k];
    const avg = w.rpes.length ? w.rpes.reduce((a,b)=>a+b,0)/w.rpes.length : 0;
    return avg >= 7 || w.count >= 4;
  });
}

function startSession(preset){
  // preset: { blocks:[...], date } optional
  if(State.currentSession){ go('session'); return; }
  if(!preset){
    // If today's plan has content, ask whether to adopt it
    const wp = Store.get('weekPlan', {});
    const dKey = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
    const dayPlan = wp[dKey];
    if(dayPlan && !dayPlan.rest && Array.isArray(dayPlan.items) && dayPlan.items.length){
      askAdoptPlan(dayPlan); return;
    }
  }
  _createSession(preset);
}
function _createSession(preset){
  preset = preset || {};
  State.currentSession = {
    id: uid('s'),
    date: preset.date || todayISO(),
    startedAt: Date.now(),
    rpePrePhys:null, rpePreMental:null, preNote:'', focus:'',
    rpePostPhys:null, rpePostMental:null, note:'', nextFocus:'',
    blocks: preset.blocks || [
      {key:'warmup', name:'Warm-up', exercises:[]},
      {key:'climb', name:'Klettern / Bouldern', exercises:[]},
      {key:'weights', name:'Krafttraining', exercises:[]},
      {key:'cooldown', name:'Cool-down', exercises:[]}
    ],
    durationSec: 0
  };
  State.openBlockIdx = 0; // accordion starts with the first block open
  saveDraft();
  go('preSession'); // check-in page is shown automatically before logging
}
function buildBlocksFromPlan(dayPlan){
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  const blMap = Object.fromEntries(Store.get('blocks',[]).map(b=>[b.id,b]));
  const blocks = [{key:'warmup', name:'Warm-up', exercises:[]}];
  const main = {key:'main', name: dayPlan.name || 'Geplantes Training', exercises:[]};
  (dayPlan.items||[]).forEach(it=>{
    if(it.type==='block'){
      const b = blMap[it.refId];
      if(b){
        const blk = {key:'pb_'+b.id+'_'+Math.random().toString(36).slice(2,5), name:b.name, exercises:[]};
        (b.exerciseIds||[]).forEach(eid=>{ const ex=exMap[eid]; if(ex) blk.exercises.push(buildExerciseInstance(ex)); });
        blocks.push(blk);
      }
    } else {
      const ex = exMap[it.refId]; if(ex) main.exercises.push(buildExerciseInstance(ex));
    }
  });
  if(main.exercises.length) blocks.push(main);
  blocks.push({key:'cooldown', name:'Cool-down', exercises:[]});
  return blocks;
}
function askAdoptPlan(dayPlan){
  openModal(`<div class="sheet">
    <h2>Training starten<button class="close" onclick="closeModal()">×</button></h2>
    <p class="muted">Für heute ist „${escHtml(dayPlan.name||'Geplantes Training')}" geplant. Möchtest du das geplante Training übernehmen?</p>
    <div class="confirm-actions" style="flex-wrap:wrap">
      <button class="btn ghost" onclick="closeModal();_createSession()">Leer starten</button>
      <button class="btn primary" id="adopt-yes">Plan übernehmen</button>
    </div></div>`);
  document.getElementById('adopt-yes').onclick = ()=>{
    closeModal();
    _createSession({ blocks: buildBlocksFromPlan(dayPlan) });
  };
}

function cardioDeriv(c, isBike){
  if(!c.distance || !c.time) return '';
  const parts = c.time.split(':').map(Number);
  if(parts.some(isNaN)) return '';
  let secs = 0;
  if(parts.length===3) secs = parts[0]*3600+parts[1]*60+parts[2];
  else if(parts.length===2) secs = parts[0]*60+parts[1];
  else return '';
  if(secs===0||c.distance===0) return '';
  if(isBike){
    const kmh = c.distance / (secs/3600); return kmh.toFixed(1)+' km/h';
  } else {
    const sPerKm = secs / c.distance;
    const m = Math.floor(sPerKm/60), s = Math.round(sPerKm%60);
    return `${m}:${String(s).padStart(2,'0')} /km`;
  }
}
function lastSessionPerformance(refId){
  const sessions = Store.get('sessions',[]);
  for(let i=sessions.length-1;i>=0;i--){
    const s = sessions[i];
    for(const b of s.blocks||[]) for(const ex of b.exercises||[]){
      if(ex.refId===refId && ex.sets && ex.sets.length){
        const last = ex.sets[ex.sets.length-1];
        return `${ex.sets.length}× zuletzt am ${fmtDateShort(s.date)}: ${last.wReps||0}×${last.weight||0}kg`;
      }
    }
  }
  return null;
}

  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  withSes(s=>{
    const target = s.blocks[window._addingToBlock];
    // Adopt the template's name if the block still has the default heading
    if(target && b && (target.name==='Neuer Block' || !String(target.name||'').trim())) target.name = b.name;
    b.exerciseIds.forEach(eid=>{
      const ex = exMap[eid]; if(ex) target.exercises.push(buildExerciseInstance(ex));
    });
    pushRecent({kind:'block', id});
  });
  closeModal();
}
function pushRecent(item){
  const list = Store.get('recentExercises',[]).filter(x=>!(x.kind===item.kind && x.id===item.id));
  list.unshift(item); Store.set('recentExercises', list.slice(0,8));
}

/* Finish session */
function finishSession(){
  const ses = State.currentSession; if(!ses) return;
  // basic validity: at least one exercise/block has content
  const has = ses.blocks.some(b=> b.exercises.length>0);
  if(!has){
    confirmDialog('Leere Session speichern?','Du hast noch keine Übungen geloggt.',()=> reallyFinish(), {});
    return;
  }
  reallyFinish();
}
function reallyFinish(){
  const ses = State.currentSession;
  ses.durationSec = Math.round((Date.now() - ses.startedAt)/1000);
  // Detect PRs
  const prs = detectPRs(ses);
  // Save
  const list = Store.get('sessions', []); list.push(ses); Store.set('sessions', list);
  State.currentSession = null;
  clearDraft();
  if(State._sessTimer) clearInterval(State._sessTimer);
  if(prs.length){
    openModal(`<div class="sheet center">
      <div style="font-size:3rem" class="pr-celebrate">🏆</div>
      <h2 style="justify-content:center">Neue PRs!</h2>
      ${prs.map(p=>`<div class="badge success" style="margin:4px">${escHtml(p)}</div>`).join('')}
      <div class="mt"><button class="btn primary" onclick="closeModal();go('dashboard')">Super!</button></div>
    </div>`);
  } else {
    toast('Session gespeichert ✓');
    go('dashboard');
  }
}
function cancelSession(){
  confirmDialog('Session verwerfen?','Alle Eingaben gehen verloren.', ()=>{
    State.currentSession = null;
    clearDraft();
    if(State._sessTimer) clearInterval(State._sessTimer);
    go('dashboard');
  }, {danger:true, yesLabel:'Verwerfen'});
}
function detectPRs(ses){
  const prs = [];
  const past = Store.get('sessions',[]);
  ses.blocks.forEach(b=> b.exercises.forEach(ex=>{
    if(ex.type==='strength' && ex.sets.length){
      let bestW = 0, bestVol = 0, bestReps = 0;
      ex.sets.forEach(s=>{
        if((s.weight||0)>bestW) bestW = s.weight||0;
        const v = (s.weight||0) * ((s.wReps||0)+(s.bReps||0));
        if(v>bestVol) bestVol = v;
        if((s.wReps||0)+(s.bReps||0)>bestReps) bestReps = (s.wReps||0)+(s.bReps||0);
      });
      let prevW=0, prevVol=0, prevReps=0;
      past.forEach(ps=> ps.blocks?.forEach(pb=> pb.exercises?.forEach(pex=>{
        if(pex.refId===ex.refId) pex.sets?.forEach(s=>{
          if((s.weight||0)>prevW) prevW = s.weight||0;
          const v = (s.weight||0)*((s.wReps||0)+(s.bReps||0));
          if(v>prevVol) prevVol = v;
          if((s.wReps||0)+(s.bReps||0)>prevReps) prevReps=(s.wReps||0)+(s.bReps||0);
        });
      })));
      if(bestW>prevW && bestW>0) prs.push(`${ex.name}: ${bestW} kg`);
      else if(bestReps>prevReps && bestReps>0) prs.push(`${ex.name}: ${bestReps} Wdh.`);
      else if(bestVol>prevVol && bestVol>0) prs.push(`${ex.name}: ${Math.round(bestVol)} kg·Wdh.`);
    }
  }));
  return prs;
}

/* Rest timer */
function startRestTimer(){
  const s = Store.get('settings', DEFAULT_SETTINGS);
  showRestTimer(s.restTimerSeconds, s.beepEnabled);
}
function showRestTimer(seconds, beep){
  const total = seconds;
  let endsAt = Date.now() + seconds*1000;
  openModal(`<div class="sheet center">
    <h2 style="justify-content:center">Pause</h2>
    <div class="timer-circle">
      <svg viewBox="0 0 120 120" width="160" height="160">
        <circle cx="60" cy="60" r="54" stroke="var(--bg-3)" stroke-width="10" fill="none"/>
        <circle id="rt-arc" cx="60" cy="60" r="54" stroke="var(--accent)" stroke-width="10" fill="none"
          stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="rt-text">${seconds}</div>
    </div>
    <div class="row mt">
      <button class="btn sm" onclick="adjustRest(-15)">−15s</button>
      <button class="btn sm" onclick="adjustRest(15)">+15s</button>
    </div>
    <div class="mt">
      <button class="btn block" onclick="closeRest()">Pause beenden</button>
    </div>
  </div>`);
  State._restEnd = endsAt; State._restTotal = total; State._restBeep = beep;
  tickRest();
}
function adjustRest(delta){
  State._restEnd += delta*1000;
  State._restTotal = Math.max(State._restTotal, State._restTotal + (delta>0?delta:0));
  tickRest();
}
function tickRest(){
  if(State._restTimer) clearTimeout(State._restTimer);
  const remain = (State._restEnd - Date.now())/1000;
  const txt = document.getElementById('rt-text');
  const arc = document.getElementById('rt-arc');
  if(!txt || !arc) return;
  if(remain<=0){
    txt.textContent = 'Fertig!';
    arc.style.strokeDashoffset = 339.292;
    if(State._restBeep) playBeep();
    setTimeout(()=>{ closeRest(); }, 800);
    return;
  }
  txt.textContent = Math.ceil(remain);
  const frac = remain / State._restTotal;
  arc.style.strokeDashoffset = 339.292 * (1-frac);
  State._restTimer = setTimeout(tickRest, 200);
}
function closeRest(){
  if(State._restTimer) clearTimeout(State._restTimer);
  closeModal();
  if(State.superset) renderSupersetView(); // resume superset view after a pause
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = 880; o.type='sine';
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.3, ctx.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.4);
    o.start(); o.stop(ctx.currentTime+.45);
  }catch(e){}
}

/* Repeater sequence: hang -> rest -> repeat for reps -> set rest */
function startRepeaterSequence(p){
  let phase = 'hang';
  let rep = 1, set = 1;
  let secs = p.hangSec;
  openModal(`<div class="sheet center">
    <h2 style="justify-content:center" id="rep-h">Hängen</h2>
    <div class="muted" id="rep-info">Satz 1/${p.sets} · Wdh 1/${p.reps}</div>
    <div class="timer-circle">
      <svg viewBox="0 0 120 120" width="160" height="160">
        <circle cx="60" cy="60" r="54" stroke="var(--bg-3)" stroke-width="10" fill="none"/>
        <circle id="rep-arc" cx="60" cy="60" r="54" stroke="var(--accent)" stroke-width="10" fill="none"
          stroke-linecap="round" stroke-dasharray="339.292" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="rep-text">${secs}</div>
    </div>
    <div class="mt"><button class="btn block" onclick="stopRepSeq()">Stop</button></div>
  </div>`);
  let endsAt = Date.now() + secs*1000;
  let total = secs;
  function loop(){
    const remain = (endsAt - Date.now())/1000;
    document.getElementById('rep-text').textContent = Math.max(0,Math.ceil(remain));
    const frac = Math.max(0,remain)/total;
    const arc = document.getElementById('rep-arc');
    if(arc) arc.style.strokeDashoffset = 339.292*(1-frac);
    if(remain<=0){
      if(Store.get('settings',DEFAULT_SETTINGS).beepEnabled) playBeep();
      // advance phase
      if(phase==='hang'){
        if(rep < p.reps){ phase='rest'; total = p.repRest; endsAt = Date.now()+total*1000;
          document.getElementById('rep-h').textContent='Pause Wdh';
          document.getElementById('rep-info').textContent=`Satz ${set}/${p.sets} · nächste Wdh ${rep+1}/${p.reps}`;
        } else if(set < p.sets){ phase='setrest'; total = p.setRest; endsAt = Date.now()+total*1000;
          document.getElementById('rep-h').textContent='Satzpause';
          document.getElementById('rep-info').textContent=`Nach Satz ${set}/${p.sets}`;
        } else { closeModal(); return; }
      } else if(phase==='rest'){
        rep++; phase='hang'; total = p.hangSec; endsAt = Date.now()+total*1000;
        document.getElementById('rep-h').textContent='Hängen';
        document.getElementById('rep-info').textContent=`Satz ${set}/${p.sets} · Wdh ${rep}/${p.reps}`;
      } else if(phase==='setrest'){
        set++; rep=1; phase='hang'; total = p.hangSec; endsAt = Date.now()+total*1000;
        document.getElementById('rep-h').textContent='Hängen';
        document.getElementById('rep-info').textContent=`Satz ${set}/${p.sets} · Wdh 1/${p.reps}`;
      }
    }
    State._repSeq = setTimeout(loop, 150);
  }
  loop();
}
function stopRepSeq(){ if(State._repSeq) clearTimeout(State._repSeq); closeModal(); }
</script>
<script>
/* ============================================================
   Section: WEEK PLAN
============================================================ */
const DAY_KEYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const DAY_LABELS = {monday:'Montag',tuesday:'Dienstag',wednesday:'Mittwoch',thursday:'Donnerstag',
  friday:'Freitag',saturday:'Samstag',sunday:'Sonntag'};

function renderPlan(){
  const wp = Store.get('weekPlan', {});
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  const blMap = Object.fromEntries(Store.get('blocks',[]).map(b=>[b.id,b]));

      <h3>
        <div>${DAY_LABELS[k]}
          <input style="width:auto;display:inline-block;margin-left:6px;background:transparent;border:none;color:var(--text-muted);font-size:.85rem;font-weight:500" value="${escHtml(d.name||'')}" placeholder="Trainingsname"
            onchange="updateDayName('${k}',this.value)">
        </div>
        <div style="display:flex;gap:4px">
          <button class="chip chip-btn ${d.rest?'on':''}" onclick="toggleRest('${k}','rest')">🛌</button>
          <button class="chip chip-btn ${d.activeRest?'on':''}" onclick="toggleRest('${k}','activeRest')">🚶</button>
          <button class="chip chip-btn" onclick="openMoveDay('${k}')" title="Tag verschieben">↔</button>
        </div>
      </h3>

        d.activeRest ? `<div class="muted small">Aktive Erholung</div>` :

          const obj = it.type==='block' ? blMap[it.refId] : exMap[it.refId];
          return `<div class="item" draggable="true" data-day="${k}" data-i="${i}"
            ondragstart="dragStart(event)" ondragover="event.preventDefault()" ondrop="dropOnItem(event)">
            <span class="drag-handle">≡</span>
            <span>${it.type==='block'?'📦 ':''}${escHtml(obj?.name||'?')}</span>
            <span style="flex:1"></span>
            <button class="x-btn" onclick="rmPlanItem('${k}',${i})">×</button>
          </div>`;
        }).join('')}
      <div class="row mt">
        <button class="btn sm block" onclick="openAddPlanItem('${k}','exercise')">+ Übung</button>
        <button class="btn sm block" onclick="openAddPlanItem('${k}','block')">+ Block</button>
      </div>

function afterPlan(){}
function updateDayName(k,v){
  const wp = Store.get('weekPlan',{});
  wp[k] = wp[k]||{name:'',items:[],rest:false,activeRest:false}; wp[k].name = v;
  Store.set('weekPlan', wp);
}
function toggleRest(k, field){
  const wp = Store.get('weekPlan',{});
  wp[k] = wp[k]||{name:'',items:[],rest:false,activeRest:false};
  wp[k][field] = !wp[k][field];
  if(field==='rest' && wp[k].rest) wp[k].activeRest = false;
  if(field==='activeRest' && wp[k].activeRest) wp[k].rest = false;
  Store.set('weekPlan', wp); render();
}
function rmPlanItem(k,i){
  const wp = Store.get('weekPlan',{});
  wp[k].items.splice(i,1); Store.set('weekPlan', wp); render();
}
function openAddPlanItem(day, kind){
  if(kind==='exercise'){
    const ex = Store.get('exercises',[]);
    openModal(`<div class="sheet">
      <h2>Übung hinzufügen<button class="close" onclick="closeModal()">×</button></h2>
      <input id="pl-search" placeholder="Suchen…" oninput="filterPlanList('${day}','exercise')">
      <div id="pl-list" style="max-height:50vh;overflow-y:auto"></div>
    </div>`);
    filterPlanList(day,'exercise');
  } else {
    openModal(`<div class="sheet">
      <h2>Block hinzufügen<button class="close" onclick="closeModal()">×</button></h2>
      <input id="pl-search" placeholder="Suchen…" oninput="filterPlanList('${day}','block')">
      <div id="pl-list" style="max-height:50vh;overflow-y:auto"></div>
    </div>`);
    filterPlanList(day,'block');
  }
}
function filterPlanList(day, kind){
  const q = (document.getElementById('pl-search').value||'').toLowerCase();
  const items = kind==='exercise' ? Store.get('exercises',[]) : Store.get('blocks',[]);
  const filtered = items.filter(x=> x.name.toLowerCase().includes(q));
  document.getElementById('pl-list').innerHTML = filtered.map(x=>
    `<div class="list-item">
      <div style="flex:1"><div style="font-weight:600">${kind==='block'?'📦 ':''}${escHtml(x.name)}</div>
      ${kind==='exercise'?`<div class="muted small">${(x.muscles||[]).join(', ')||x.type}</div>`:''}</div>
      <button class="btn sm primary" onclick="addPlanItem('${day}','${kind}','${x.id}')">+</button>
    </div>`).join('') || '<div class="empty-state">Keine Treffer</div>';
}
function addPlanItem(day, kind, id){
  const wp = Store.get('weekPlan',{});
  wp[day] = wp[day]||{name:'',items:[],rest:false,activeRest:false};
  wp[day].items.push({type: kind==='block'?'block':'exercise', refId:id});
  Store.set('weekPlan', wp); closeModal(); render();
}
/* Move (swap) a day's plan to another weekday */
function openMoveDay(srcKey){
  openModal(`<div class="sheet">
    <h2>„${DAY_LABELS[srcKey]}" verschieben<button class="close" onclick="closeModal()">×</button></h2>
    <p class="muted small">Wähle den Wochentag, mit dem dieser Tag getauscht werden soll.</p>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${DAY_KEYS.filter(k=>k!==srcKey).map(k=>
        `<button class="btn block" onclick="moveDayTo('${srcKey}','${k}')">${DAY_LABELS[k]}</button>`).join('')}
    </div></div>`);
}
function moveDayTo(srcKey, dstKey){
  const wp = Store.get('weekPlan', {});
  const blank = ()=>({name:'',items:[],rest:false,activeRest:false});
  const src = wp[srcKey] || blank();
  const dst = wp[dstKey] || blank();
  wp[srcKey] = dst; wp[dstKey] = src; // swap so nothing is lost
  Store.set('weekPlan', wp); closeModal(); render();
  toast(`Verschoben → ${DAY_LABELS[dstKey]}`);
}
function copyPlanToNextWeek(){
  confirmDialog('Plan zurücksetzen?','Aktuelle Wocheneinträge werden geleert. Übungen sind weiter in der Bibliothek.',
    ()=>{
      const wp = {};
      DAY_KEYS.forEach(k=> wp[k]={name:'',items:[],rest:false,activeRest:false});
      Store.set('weekPlan',wp); render(); toast('Plan zurückgesetzt');
    },{});
}
/* drag & drop reorder within a day */
let _drag = null;
function dragStart(e){
  const el = e.currentTarget;
  _drag = { day: el.dataset.day, i: +el.dataset.i };
  el.classList.add('dragging');
}
function dropOnItem(e){
  e.preventDefault();
  const el = e.currentTarget; el.classList.remove('drag-over');
  const day = el.dataset.day, j = +el.dataset.i;
  if(!_drag || _drag.day!==day) return;
  const wp = Store.get('weekPlan',{});
  const arr = wp[day].items;
  const [it] = arr.splice(_drag.i, 1);
  arr.splice(j,0,it);
  Store.set('weekPlan', wp); _drag = null; render();
}

/* ============================================================
   Section: CALENDAR
============================================================ */
function renderCalendar(){
  const {y,m} = State.cal;
  const first = new Date(y,m,1);
  const startDay = (first.getDay()+6)%7; // Mon=0
  const daysInMonth = new Date(y,m+1,0).getDate();
  const sessions = Store.get('sessions',[]);
  const injuries = Store.get('injuries',[]);
  const sByDate = {};
  sessions.forEach(s=>{ (sByDate[s.date]=sByDate[s.date]||[]).push(s); });
  const monName = first.toLocaleDateString('de-DE',{month:'long',year:'numeric'});

  const cells = [];
  // prev month padding
  const prevMonthDays = new Date(y,m,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    cells.push({n: prevMonthDays-i, other:true, iso:null});
  }
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({n:d, other:false, iso});
  }
  while(cells.length%7!==0) cells.push({n:cells.length-startDay-daysInMonth+1, other:true, iso:null});

  return `
  <div class="cal-head">
    <button class="icon-btn" onclick="changeMonth(-1)">‹</button>
    <h2>${monName}</h2>
    <button class="icon-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="cal-grid">
    ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="dow">${d}</div>`).join('')}
    ${cells.map(c=>{
      if(!c.iso) return `<div class="cal-day other"><div class="num">${c.n}</div></div>`;
      const dayS = sByDate[c.iso]||[];
      const isToday = c.iso===todayISO();
      const types = new Set();
      dayS.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=> types.add(ex.type))));
      const icons = []; if(types.has('climb')) icons.push('🧗');
      if(types.has('strength')||types.has('hangboard')) icons.push('💪');
      if(types.has('run')) icons.push('🏃'); if(types.has('bike')) icons.push('🚴');
      if(icons.length>=3) icons.length=2, icons.push('🔥');
      const inj = injuries.some(i=> c.iso>=i.start && (!i.end||c.iso<=i.end));
      if(inj) icons.push('🩹');
      const rpe = dayS.length ? Math.max(...dayS.map(s=> s.rpePostPhys||0)) : 0;
      const dotColor = rpe>=9?'var(--danger)':rpe>=8?'var(--orange)':rpe>=6?'var(--warning)':rpe>0?'var(--success)':'transparent';
      const isDeload = isDeloadDate(c.iso);
      return `<div class="cal-day ${isToday?'today':''} ${isDeload?'deload':''}" onclick="openDayDetail('${c.iso}')">
        <div class="num">${c.n}</div>
        <div class="icons">${icons.join('')}</div>
        ${rpe>0?`<div class="dot" style="background:${dotColor}"></div>`:''}
      </div>`;
    }).join('')}
  </div>
  <div class="muted small mt">Punkt-Farbe: RPE-Nachher (Grün ≤5, Gelb 6-7, Orange 8, Rot ≥9). Blau hinterlegt = Deload-Woche.</div>
  `;
}
function changeMonth(d){
  let m = State.cal.m + d, y = State.cal.y;
  if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
  State.cal = {y,m}; render();
}
function isDeloadDate(iso){
  const s = Store.get('settings', DEFAULT_SETTINGS);
  if(!s.meso.startDate) return false;
  const start = new Date(s.meso.startDate+'T00:00:00');
  const date = new Date(iso+'T00:00:00');
  const days = Math.floor((date-start)/(86400000));
  if(days<0) return false;
  const week = Math.floor(days/7) % s.meso.length;
  return s.meso.deloadWeeks?.includes(week);
}
function openDayDetail(iso){
  const sessions = Store.get('sessions',[]).filter(s=>s.date===iso);
  const injuries = Store.get('injuries',[]).filter(i=> iso>=i.start && (!i.end||iso<=i.end));
  openModal(`<div class="sheet">
    <h2>${fmtDate(iso)}<button class="close" onclick="closeModal()">×</button></h2>
    ${sessions.length===0 && injuries.length===0
      ? `<div class="empty-state"><div class="em">📭</div>Kein Eintrag für diesen Tag.</div>`
      : ''}
    ${injuries.map(i=>`<div class="banner">🩹 ${escHtml(i.diagnosis||i.area)} (Schwere ${i.severity})</div>`).join('')}
    ${sessions.map(s=>renderSessionDetailHtml(s)).join('')}
    ${iso < todayISO()
      ? `<div class="row mt"><button class="btn primary block" onclick="logPastSession('${iso}')">＋ ${sessions.length?'Weiteres Training nachtragen':'Training nachtragen'}</button></div>`
      : ''}
  </div>`);
}
function logPastSession(iso){
  closeModal();
  if(State.currentSession){ toast('Erst die aktive Session abschließen'); go('session'); return; }
  _createSession({ date: iso });
  toast('Training für ' + fmtDateShort(iso) + ' nachtragen');
}
function renderSessionDetailHtml(s){
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  return `<div class="card" style="background:var(--bg-2)">
    <div class="card-row">
      <div><strong>${fmtSec(s.durationSec||0)}</strong> · RPE ${s.rpePostPhys||'-'}/${s.rpePostMental||'-'}</div>
      <button class="btn sm danger" onclick="deleteSession('${s.id}')">×</button>
    </div>
    ${s.note ? `<div class="muted small mt">📝 ${escHtml(s.note)}</div>`:''}
    ${s.blocks.filter(b=>b.exercises.length).map(b=>`
      <div class="mt"><strong class="small">${escHtml(b.name)}</strong>
        ${b.exercises.map(ex=>{
          if(ex.type==='strength') return `<div class="small muted">• ${escHtml(ex.name)}: ${ex.sets.length} Sätze${
            ex.sets[0]?.weight?', max '+Math.max(...ex.sets.map(s=>s.weight||0))+'kg':''}</div>`;
          if(ex.type==='climb') return `<div class="small muted">• ${escHtml(ex.name)}: ${ex.problems.length} Probleme${
            ex.problems.length?', '+ex.problems.filter(p=>p.result==='Send'||p.result==='Flash').length+' Sends':''}</div>`;
          if(ex.type==='hangboard') return `<div class="small muted">• ${escHtml(ex.name)}: ${ex.protocols.length} Protokolle</div>`;
          if(ex.type==='run'||ex.type==='bike'){
            const c=ex.cardio||{}; return `<div class="small muted">• ${escHtml(ex.name)}: ${c.distance||0} km${c.time?', '+c.time:''}</div>`;
          }
          return `<div class="small muted">• ${escHtml(ex.name)}</div>`;
        }).join('')}
      </div>`).join('')}

function renderStatsStrength(){
  const sessions = filteredSessions();
  const exMap = Object.fromEntries(Store.get('exercises',[]).map(e=>[e.id,e]));
  // exercise progression
  const byEx = {};
  sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
    if(ex.type!=='strength' || !ex.sets?.length) return;
    byEx[ex.refId] = byEx[ex.refId] || {name: ex.name, points:[]};
    const maxW = Math.max(...ex.sets.map(x=>x.weight||0));
    const bestSet = ex.sets.find(x=>(x.weight||0)===maxW) || ex.sets[0];
    const reps = (bestSet.wReps||0) + (bestSet.bReps||0);
    byEx[ex.refId].points.push({date:s.date, max:maxW, e1rm: reps>0?epley(maxW,reps):maxW});
  })));
  const exIds = Object.keys(byEx);
  // PRs table
  const prs = [];
  Object.entries(byEx).forEach(([id,obj])=>{
    let bestW = 0, bestDate=null, bestReps=0;
    obj.points.forEach(p=>{
      if(p.max>bestW){ bestW=p.max; bestDate=p.date; }
    });
    sessions.forEach(s=> s.blocks?.forEach(b=> b.exercises?.forEach(ex=>{
      if(ex.refId!==id) return;
      ex.sets?.forEach(st=>{

    <h3>Persönliche Bestleistungen</h3>

      `<table style="width:100%;border-collapse:collapse">
        <tr style="text-align:left;color:var(--text-muted);font-size:.78rem">
          <th>Übung</th><th>Gewicht</th><th>Wdh.</th><th>Datum</th></tr>
        ${prs.sort((a,b)=>b.weight-a.weight).map(p=>`<tr style="border-top:1px solid var(--border)">
          <td>${escHtml(p.name)}</td><td><strong>${p.weight} kg</strong></td>

/* Chart helpers */
let _charts = {};
function destroyCharts(){
  Object.values(_charts).forEach(c=>{ try{c.destroy()}catch(e){} });
  _charts = {};
}
function chartColors(){
  const css = getComputedStyle(document.documentElement);
  return {
    text: css.getPropertyValue('--text').trim(),
    muted: css.getPropertyValue('--text-muted').trim(),
    accent: css.getPropertyValue('--accent').trim(),
    border: css.getPropertyValue('--border').trim()
  };
}
function commonChartOpts(){
  const c = chartColors();
  Chart.defaults.color = c.muted;
  Chart.defaults.borderColor = c.border;
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ labels:{color:c.muted} } },
    scales:{
      x:{ grid:{color:c.border}, ticks:{color:c.muted} },
      y:{ grid:{color:c.border}, ticks:{color:c.muted}, beginAtZero:true }
    }
  };
}
function weeksMap(sessions, weeks=12){
  const map = {};
  for(let i=weeks-1;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i*7);
    const day = (d.getDay()+6)%7; d.setDate(d.getDate()-day);
    map[d.toISOString().slice(0,10)] = 0;
  }
  return map;
}
function buildFreqChart(sessions){
  destroyChart('ch-freq');
  const map = weeksMap(sessions, 12);
  sessions.forEach(s=>{
    const d = new Date(s.date+'T00:00:00');
    const day = (d.getDay()+6)%7; d.setDate(d.getDate()-day);
    const k = d.toISOString().slice(0,10); if(k in map) map[k]++;
  });
  const ctx = document.getElementById('ch-freq'); if(!ctx) return;
  _charts['ch-freq'] = new Chart(ctx, {type:'bar', data:{
    labels: Object.keys(map).map(k=>fmtDateShort(k)),
    datasets:[{label:'Sessions', data:Object.values(map),
      backgroundColor: chartColors().accent}]
  }, options: commonChartOpts()});
}
